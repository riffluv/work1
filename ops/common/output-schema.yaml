version: 2

required_fields:
  - src
  - state
  - user_intent
  - case_type
  - certainty
  - service_fit
  - risk_level
  - risk_flags
  - scope_judgement
  - reply_stance
  - reply_contract
  - missing_info
  - next_action
  - human_review_required
  - reply_generation

field_rules:
  src:
    allowed:
      - service
      - profile
      - message
      - talkroom
  state:
    allowed:
      - prequote
      - quote_sent
      - purchased
      - predelivery
      - delivered
      - closed
  case_type:
    allowed:
      - bugfix
      - handoff
      - boundary
      - after_purchase
      - after_close
  certainty:
    allowed:
      - high
      - low
  service_fit:
    allowed:
      - high
      - medium
      - service_mismatch_but_feasible
      - low
      - unknown
  risk_level:
    allowed:
      - low
      - medium
      - high
  scope_judgement:
    allowed:
      - same_cause_likely
      - different_cause_likely
      - undecidable
      - not_applicable
  reply_generation:
    allowed:
      - analysis_only
      - draft_if_requested
      - ready_to_draft

optional_fields:
  - service_id
  - summary
  - scenario
  - known_facts
  - user_override
  - routing_meta
  - response_decision_plan
  - evidence_found
  - ask_count
  - reply_notes
  - emotional_caution
  - temperature_plan

nested_field_rules:
  reply_stance:
    required:
      - burden_owner
      - empathy_first
      - reply_skeleton
    optional_fields:
      - answer_timing
    answer_timing:
      allowed:
        - now
        - after_check
    burden_owner:
      allowed:
        - us
        - client
        - shared
    empathy_first:
      allowed:
        - true
        - false
    reply_skeleton:
      allowed:
        - estimate_initial
        - estimate_followup
        - post_purchase_receipt
        - post_purchase_quick
        - post_purchase_report
        - delivery
    derived_rules:
      - answer_timing is a summary field derived from answer_map for primary_question_id
      - when answer_timing is present, it must not conflict with answer_map[].disposition for primary_question_id
      - writer and renderer must treat answer_map as the executable source of truth
  reply_contract:
    required:
      - primary_question_id
      - explicit_questions
      - answer_map
      - ask_map
      - issue_plan
      - required_moves
      - forbidden_moves
    primary_question_id:
      description: the question_id that must be answered in the earliest answer-bearing section
    optional_fields:
      - issues
      - implicit_concerns
      - final_question_id
      - primary_decision_need
      - primary_selection_evidence
    explicit_questions:
      required_item_fields:
        - id
        - text
        - priority
      priority:
        allowed:
          - primary
          - secondary
      optional_item_fields:
        - source_span
    answer_map:
      required_item_fields:
        - question_id
        - disposition
      disposition:
        allowed:
          - answer_now
          - answer_after_check
          - ask_client
          - decline
      optional_item_fields:
        - answer_brief
        - hold_reason
        - revisit_trigger
        - evidence_refs
    ask_map:
      required_item_fields:
        - id
        - question_ids
        - ask_text
        - why_needed
      optional_item_fields:
        - evidence_kind
    issue_plan:
      required_item_fields:
        - issue
        - disposition
      disposition:
        allowed:
          - answer_now
          - answer_after_check
          - ask_client
          - decline
      optional_item_fields:
        - reason
        - depends_on
    required_moves:
      allowed:
        - answer_directly_now
        - defer_with_reason
        - request_minimum_evidence
        - commit_next_update_time
        - react_briefly_first
        - decide_for_user
        - confirm_receipt
        - give_purchase_path
        - explain_scope_boundary
    forbidden_moves:
      allowed:
        - reopen_estimate_intake
        - numbered_QA_for_all_questions
        - ask_client_to_prioritize_when_burden_owner_us
        - vague_hold_without_reason
        - internal_term_exposure
        - overexplain_branching
        - frontload_price_when_not_asked
        - frontload_branching_risk_when_not_asked
        - frontload_scope_explanation_when_not_asked
    derived_rules:
      - answer_map and ask_map are the executable contract for renderer and lint
      - issue_plan remains as a compatibility summary and must be derived from answer_map and ask_map, not treated as a separate source of truth
      - every answer_after_check item in answer_map must include hold_reason and revisit_trigger
      - ask_map must stay minimal and link each ask to one or more explicit_questions via question_ids
      - forbidden_moves must be selected from state, reply_skeleton, burden_owner, primary_question_id, and explicit_questions, not left as a generic preference list
      - internal_term_exposure should be present for almost all external replies unless there is a documented exception
      - when the primary question is not about price, branching risk, or broad scope, those topics should be blocked from the first answer-bearing section via the corresponding frontload forbidden_moves unless policy requires otherwise
      - the first answer-bearing section must answer primary_question_id before introducing secondary topics
      - topics not represented in explicit_questions must not lead the first answer-bearing section unless needed for safety, policy, or to avoid a misleading answer
      - price, branching risk, and broad scope explanation must not be front-loaded when they are not part of the primary question and not required by policy
      - final_question_id is only a selection cue; it must not mechanically override primary_question_id
      - primary_decision_need should describe what the buyer is trying to decide next, not a sentence to copy into the reply
      - primary_selection_evidence should explain why primary_question_id was chosen when the message has multiple symptoms or multiple questions
  temperature_plan:
    required:
      - user_signal
      - support_goal
      - opening_move
      - ack_style
      - ack_anchor
      - warmth_cap
      - tone_constraints
    user_signal:
      allowed:
        - stress
        - hesitation
        - confusion
        - negative_feedback
        - gratitude
        - weakness
        - neutral
    support_goal:
      allowed:
        - reduce_burden
        - normalize
        - receive_feedback
        - receive_goodwill
        - set_boundary_calmly
        - move_forward
    opening_move:
      allowed:
        - action_first
        - pressure_release
        - normalize_then_clarify
        - receive_and_own
        - brief_ack_then_answer
        - yes_no_first
        - neutral_ack
    ack_style:
      allowed:
        - none
        - brief_generic
        - brief_specific
    ack_anchor:
      allowed:
        - none
        - buyer_action
        - buyer_effort
        - buyer_result
        - buyer_goodwill
        - buyer_openness
        - issue_detail
    warmth_cap:
      allowed:
        - none
        - one_sentence
        - two_clauses
    tone_constraints:
      allowed:
        - no_defense
        - no_internal_terms
        - no_burden_shift
        - no_negative_lead
        - no_groundless_reassurance
        - no_sycophancy
        - no_emotion_completion
        - no_boundary_softening
    derived_rules:
      - temperature_plan is an interaction truth source and must not change reply_contract.answer_map or ask_map
      - boundary handling stays in reply_contract.case_type and reply skeleton; temperature_plan only chooses the interaction move for that case
      - ack_style and ack_anchor only control the opening ack slot and must not change answer polarity, scope, price, or ask count
      - when ack_style is brief_specific and ack_anchor is not none, the first one or two sentences should mention a concrete buyer action, effort, result, goodwill, openness, or issue detail
      - warmth_cap limits emotional language; v1 should stay at one_sentence or lower for stress, weakness, gratitude, and negative_feedback
      - user_signal=gratitude should usually pair with support_goal=receive_goodwill and opening_move=brief_ack_then_answer or neutral_ack
      - user_signal=negative_feedback should usually pair with support_goal=receive_feedback and opening_move=receive_and_own or action_first
      - user_signal=stress should usually pair with support_goal=reduce_burden and opening_move=action_first or pressure_release
      - no_groundless_reassurance forbids unsupported calming claims such as "よくあるケースです" or "大丈夫です" without evidence
      - no_sycophancy forbids agreeing with buyer mistakes, softening boundaries, or mirroring praise in a way that weakens factual accuracy
      - no_emotion_completion forbids over-interpreting or completing the buyer's feelings beyond what they actually said
  user_override:
    required:
      - raw_text
    optional_fields:
      - source
      - applies_to
      - parsed_preferences
      - conflict_policy
    source:
      allowed:
        - inline_after_tag
        - next_line
        - multi_line_note
    applies_to:
      allowed:
        - temperature_plan
        - reply_contract
        - response_decision_plan
        - routing_preference
    parsed_preferences:
      allowed:
        - soften_tone
        - apology_first
        - avoid_fee_talk
        - ask_limit_one
        - short_reply
        - bugfix_only
        - no_handoff_pitch
    conflict_policy:
      allowed:
        - apply_if_safe
        - preserve_hard_constraints
    derived_rules:
      - user_override is optional and absent by default; when absent, existing reply behavior stays unchanged
      - hard constraints from service-registry public state, platform-contract, security rules, and minimum executable reply obligations always win over user_override
      - user_override may narrow or steer default heuristics, but must not force a false answer, hide a mandatory boundary, or remove minimum evidence needed to execute the reply safely
      - tone or opening requests should map into temperature_plan; ask-count, format, and service-emphasis requests should map into reply_contract and response_decision_plan
      - when a user override cannot be fully applied, preserve the executable contract and reflect the override as far as possible without violating hard constraints
  response_decision_plan:
    required:
      - primary_concern
      - facts_known
      - blocking_missing_facts
      - direct_answer_line
      - response_order
    optional_fields:
      - phase_act
      - explicit_questions
      - primary_question
      - ask_policy
      - known_facts_used
      - risk_flags
      - answer_focus
      - direct_answer_intent
      - suggested_answer_line
      - preserve_policy
      - commercial_temperature
      - buyer_material_literacy
      - fee_outcome_anxiety
      - post_completion_check_scope
    phase_act:
      allowed:
        - estimate_answer
        - estimate_hold
        - purchase_check_started
        - purchase_scope_recheck
    commercial_temperature:
      optional_fields:
        - purchase_intent
        - cta_strength
      purchase_intent:
        allowed:
          - ready
          - conditional
          - hesitant
          - not_ready
          - unknown
      cta_strength:
        allowed:
          - direct
          - conditional
          - available
          - none
    buyer_material_literacy:
      optional_fields:
        - level
        - safe_default_input
      level:
        allowed:
          - engineer_or_specific
          - unknown
          - non_engineer
          - ai_generated
          - file_unknown
      safe_default_input:
        allowed:
          - relation_files
          - code_zip_plus_logs_screens
          - screenshots_and_logs
          - none
    fee_outcome_anxiety:
      optional_fields:
        - level
      level:
        allowed:
          - none
          - light
          - unresolved_explicit
          - refund_cancel_explicit
    post_completion_check_scope:
      optional_fields:
        - input_basis
        - check_output
        - work_boundary
        - escalation_path
    derived_rules:
      - response_decision_plan is a pre-render decision object and must not replace reply_contract
      - reply_contract remains the source of truth for what may be said
      - response_decision_plan decides concern focus, answer-first line, missing-fact gating, and section order
      - phase_act should describe the current speech act of the reply, not the future implementation step
      - when state is prequote and reply_skeleton is estimate_initial or estimate_followup, phase_act should stay in estimate_answer or estimate_hold
      - when state is purchased and reply_skeleton is post_purchase_quick or post_purchase_report, phase_act should stay in purchase_check_started or purchase_scope_recheck
      - estimate_* phase_act must not imply that code, logs, ZIP, or permissions were already received and reviewed
      - purchase_* phase_act may refer to ongoing confirmation work, current inspection focus, or scope recheck inside the talkroom
      - direct_answer_line must be renderable as an early answer-bearing line when the primary question is answerable
      - direct_answer_intent is preferred for semantic preservation when exact wording would over-constrain the writer
      - suggested_answer_line is an anchor, not a template; use preserve_policy=intent_not_exact_wording when present
      - answer_focus should connect primary_decision_need, target issues, and answer_frame for multi-question or multi-symptom inputs
      - commercial_temperature should calibrate CTA strength only; it must not change price, scope, or phase
      - buyer_material_literacy should guide material request burden only; it must not make prequote code review permissible
      - fee_outcome_anxiety should calibrate explanation amount only; it must not guarantee refund, cancellation, free work, or successful repair
      - post_completion_check_scope should distinguish visible-range relation check from code repair, file return, and fee handling after delivery or close
      - blocking_missing_facts must gate ask generation; when empty, the renderer should not re-ask known context
      - validator should check that rendered text preserves direct_answer_line intent and does not duplicate its meaning across nearby sections
