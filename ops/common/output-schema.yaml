version: 2

required_fields:
  - src
  - state
  - user_intent
  - case_type
  - certainty
  - service_fit
  - risk_level
  - risk_flags
  - scope_judgement
  - reply_stance
  - reply_contract
  - missing_info
  - next_action
  - human_review_required
  - reply_generation

field_rules:
  src:
    allowed:
      - service
      - profile
      - message
      - talkroom
  state:
    allowed:
      - prequote
      - quote_sent
      - purchased
      - predelivery
      - delivered
      - closed
  case_type:
    allowed:
      - bugfix
      - handoff
      - boundary
      - after_purchase
      - after_close
  certainty:
    allowed:
      - high
      - low
  service_fit:
    allowed:
      - high
      - medium
      - service_mismatch_but_feasible
      - low
      - unknown
  risk_level:
    allowed:
      - low
      - medium
      - high
  scope_judgement:
    allowed:
      - same_cause_likely
      - different_cause_likely
      - undecidable
      - not_applicable
  reply_generation:
    allowed:
      - analysis_only
      - draft_if_requested
      - ready_to_draft

optional_fields:
  - service_id
  - summary
  - evidence_found
  - ask_count
  - reply_notes
  - emotional_caution

nested_field_rules:
  reply_stance:
    required:
      - burden_owner
      - empathy_first
      - reply_skeleton
    optional_fields:
      - answer_timing
    answer_timing:
      allowed:
        - now
        - after_check
    burden_owner:
      allowed:
        - us
        - client
        - shared
    empathy_first:
      allowed:
        - true
        - false
    reply_skeleton:
      allowed:
        - estimate_initial
        - estimate_followup
        - post_purchase_receipt
        - post_purchase_quick
        - post_purchase_report
        - delivery
    derived_rules:
      - answer_timing is a summary field derived from answer_map for primary_question_id
      - when answer_timing is present, it must not conflict with answer_map[].disposition for primary_question_id
      - writer and renderer must treat answer_map as the executable source of truth
  reply_contract:
    required:
      - primary_question_id
      - explicit_questions
      - answer_map
      - ask_map
      - issue_plan
      - required_moves
      - forbidden_moves
    primary_question_id:
      description: the question_id that must be answered in the earliest answer-bearing section
    explicit_questions:
      required_item_fields:
        - id
        - text
        - priority
      priority:
        allowed:
          - primary
          - secondary
      optional_item_fields:
        - source_span
    answer_map:
      required_item_fields:
        - question_id
        - disposition
      disposition:
        allowed:
          - answer_now
          - answer_after_check
          - ask_client
          - decline
      optional_item_fields:
        - answer_brief
        - hold_reason
        - revisit_trigger
        - evidence_refs
    ask_map:
      required_item_fields:
        - id
        - question_ids
        - ask_text
        - why_needed
      optional_item_fields:
        - evidence_kind
    issue_plan:
      required_item_fields:
        - issue
        - disposition
      disposition:
        allowed:
          - answer_now
          - answer_after_check
          - ask_client
          - decline
      optional_item_fields:
        - reason
        - depends_on
    required_moves:
      allowed:
        - answer_directly_now
        - defer_with_reason
        - request_minimum_evidence
        - commit_next_update_time
        - react_briefly_first
        - decide_for_user
        - confirm_receipt
        - give_purchase_path
        - explain_scope_boundary
    forbidden_moves:
      allowed:
        - reopen_estimate_intake
        - numbered_QA_for_all_questions
        - ask_client_to_prioritize_when_burden_owner_us
        - vague_hold_without_reason
        - internal_term_exposure
        - overexplain_branching
    derived_rules:
      - answer_map and ask_map are the executable contract for renderer and lint
      - issue_plan remains as a compatibility summary and must be derived from answer_map and ask_map, not treated as a separate source of truth
      - every answer_after_check item in answer_map must include hold_reason and revisit_trigger
      - ask_map must stay minimal and link each ask to one or more explicit_questions via question_ids
