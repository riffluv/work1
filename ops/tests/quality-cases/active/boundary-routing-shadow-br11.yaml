    first_question_to_answer: "注文作成が止まっている状態で、先に25,000円整理を挟む必要があるか。"
    raw_message: "Stripe決済は成功しますが、注文がDBに作られません。コードの流れが分からないので、先に25,000円の整理をしてから修正した方がいいですか？"
