    state: purchased
    user_type: careful_buyer
    emotional_tone: security_careful
    scenario: purchased_env_values_needed_question
    question_type: purchased_env_values_needed_question
    primary_question: 購入後、.env や APIキーの値も送る必要があるか知りたい。
    raw_message: "購入後です。.env も送った方がいいですか？APIキーの値がないと見られませんか？"
    note: 通常 live / #RE。secret 値の善意確認。buyer benefit として値は不要と伝え、キー名・設定箇所・ログなど安全材料へ寄せる。

  - id: HRC85-008
    stock_id: HRC85-008
    category: positive_flow_before_refusal
    route: message
    state: closed
    user_type: repeat_buyer
    emotional_tone: practical
    scenario: closed_log_send_relation_and_repair
    question_type: closed_log_send_relation_and_repair
    primary_question: クローズ後、ログをこのメッセージで送れるか、同じ原因なら直してもらえるか知りたい。
    raw_message: "クローズ後です。似たStripeエラーが出ています。ログはこのメッセージで送れますか？同じ原因なら直してもらえますか？"
    note: 通常 live / #RE。closed 後の positive flow と境界の両立。送ってよい -> 関係確認 -> 実作業は先相談、を自然につなげられるかを見る。
