    category: lens_inventory_cross_check
    route: service
    state: prequote
    user_type: non_engineer
    emotional_tone: anxious
    scenario: refused_elsewhere_can_request_and_outcome
    question_type: prequote_request_possible_and_no_fix_outcome
    primary_question: 他者に断られた Stripe 注文作成不具合を依頼できるか、直せなかった場合どうなるかを知りたい。
    raw_message: "他の方に見てもらったのですが、原因が分からないと言われました。Stripe決済後に注文が作られない状態です。この状態でも依頼できますか？もし直せなかった場合はどうなりますか？"
    note: 通常 live / #RE。agency_alignment と promise_consistency を同時に見る。

