    scenario: progress_anxiety
    question_type: purchased_polite_progress_anxiety
    primary_question: 購入後、催促気味にならずに現在地と次の見通しを知りたい。
    raw_message: "急かすつもりではないのですが、今どこまで分かっていますか？ログは昨日送っています。長い説明はいらないので、次に何を見るかだけ教えてください。"
    note: 通常 live / #RE。negative_frame_non_echo、進捗の短い現在地、次回見通しを確認する。

  - id: HRC79-006
