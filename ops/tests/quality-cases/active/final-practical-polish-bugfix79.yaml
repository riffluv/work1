    primary_question: 支払い後にZIPで送る場合、全部送るべきか関係ファイルだけでよいか知りたい。
    raw_message: "支払い後にZIPで送る予定です。プロジェクト全部を送った方がいいですか？それともStripeや注文作成に関係しそうなファイルだけで足りますか？"
