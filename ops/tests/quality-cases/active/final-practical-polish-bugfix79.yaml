    question_type: quote_sent_prepare_materials
    primary_question: 見積り提案後、支払い前に何を準備しておけばよいか知りたい。
    raw_message: "見積り提案ありがとうございます。支払いはこれから進めます。先に準備しておくものがあれば教えてください。支払い後にまとめて送ります。"
    note: 通常 live / #RE。支払い前作業開始にせず、buyer の準備相談として軽く返せるかを見る。

  - id: HRC79-004
    stock_id: HRC79-004
    category: final_practical_polish
    route: quote_sent
    state: quote_sent
    user_type: non_engineer
    emotional_tone: practical
    scenario: quote_sent_zip_scope_no_external
