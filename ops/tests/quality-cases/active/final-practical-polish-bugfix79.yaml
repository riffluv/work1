    emotional_tone: worried
    scenario: delivered_cannot_accept_still_broken
    question_type: delivered_still_broken_next_step
    primary_question: 納品後承諾前に、まだ直っていないように見える場合の次の動きを知りたい。
    raw_message: "納品ありがとうございます。修正ファイルを反映したつもりですが、まだ注文が作られていないように見えます。承諾前にどこを確認すればいいですか？"
    note: 通常 live / #RE。delivered を closed と誤認せず、承諾前確認として自然に材料依頼できるかを見る。

  - id: HRC79-008
    stock_id: HRC79-008
    category: final_practical_polish
    route: message
    state: closed
    user_type: repeat_buyer
    emotional_tone: polite_cautious
    scenario: closed_relation_check_before_new_request
    question_type: closed_relation_check_before_new_request
    primary_question: クローズ後、前回修正との関係だけこのメッセージで確認してもらい、必要なら新規相談にしたい。
    raw_message: "前回はありがとうございました。似たStripeエラーがまた出ています。ログをこのメッセージで送れば、前回の修正と関係がありそうかだけ見てもらえますか？直す必要がありそうなら新規で相談します。"
    note: 通常 live / #RE。前回のお礼への短い反応、closed後の関係確認、実作業/新規相談境界を自然に扱えるかを見る。
