    category: final_practical_polish
    route: talkroom
    state: purchased
    user_type: non_engineer
    emotional_tone: anxious
    scenario: extra_scope_question
    question_type: purchased_extra_symptom_fee_anxiety
    primary_question: 購入後、注文作成以外の症状も同じ原因なら範囲内か、別原因なら先に相談してもらえるか知りたい。
    raw_message: "注文作成の件に加えて、購入完了メールも届いていないことに気づきました。同じ原因なら一緒に見てもらえますか？別原因で追加料金が必要なら、先に教えてほしいです。"
    note: 通常 live / #RE。同じ原因/別原因/追加料金事前相談を自然に分ける。

  - id: HRC79-007
    stock_id: HRC79-007
    category: final_practical_polish
