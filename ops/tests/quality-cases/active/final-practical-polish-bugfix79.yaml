cases:
  - id: HRC79-001
    stock_id: HRC79-001
    category: final_practical_polish
    route: message
    state: prequote
    user_type: non_engineer
    emotional_tone: cautious
    scenario: ai_code_can_request
    question_type: prequote_ai_code_can_request
    primary_question: 前任者やAIで作ったコードでも15,000円で依頼できるか、必ず直るかを知りたい。
    raw_message: "前任者とAIで作ったコードなので中身をあまり把握できていません。Stripe決済後に注文が作られない状態ですが、15,000円でお願いできますか？必ず直るかも気になります。"
    note: 通常 live / #RE。前任者/AIコードでも受けつつ、成功保証にしない。agency_alignment と promise_consistency を見る。

  - id: HRC79-002
