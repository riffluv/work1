version: 1

cases:
  - id: HRC56-001
    stock_id: HRC56-001
    category: github_external_work_surface
    route: service
    state: prequote
    user_type: non_engineer
    emotional_tone: normal
    scenario: public_repo_url_question
    question_type: prequote_public_repo_url_and_price
    primary_question: 公開GitHub URLだけで見てもらえるか、金額はいくらかを知りたい。
    raw_message: "Stripe決済後に注文が作られません。GitHubの公開リポジトリURLを送れば見てもらえますか？金額も教えてください。"
    note: 通常 live / #RE。公開URLを外部作業面にせず、金額と購入後のトークルーム内共有へ戻せるかを見る。

  - id: HRC56-002
    stock_id: HRC56-002
    category: github_external_work_surface
    route: quote_sent
    state: quote_sent
    user_type: non_engineer
    emotional_tone: helpful
    scenario: private_repo_share_question
    question_type: quote_sent_private_repo_invite_or_zip
    primary_question: 非公開GitHub招待が必要か、zipでよいかを知りたい。
    raw_message: "見積り提案ありがとうございます。非公開のGitHubリポジトリなので、招待した方がいいですか？それとも支払い後にzipで送れば進められますか？"
    note: 通常 live / #RE。GitHub招待を受ける前提にせず、支払い後のトークルーム添付へ寄せる。

  - id: HRC56-003
    stock_id: HRC56-003
    category: github_external_work_surface
    route: talkroom
    state: purchased
    user_type: engineer
    emotional_tone: normal
    scenario: repo_invite_and_screenshots
    question_type: purchased_github_invite_and_screenshot
    primary_question: GitHub招待とスクショを送ったので、そこから確認できるかを知りたい。
    raw_message: "購入しました。GitHub招待を送りました。Stripeのスクショも送っています。GitHub側で見てもらえますか？必要ならPRにコメントしてもらって大丈夫です。"
    note: 通常 live / #RE。購入後でも GitHub / PR コメントを作業面にせず、トークルーム内の材料共有へ戻す。

  - id: HRC56-004
    stock_id: HRC56-004
    category: github_external_work_surface
    route: talkroom
    state: purchased
    user_type: engineer
    emotional_tone: practical
    scenario: direct_push_request
    question_type: purchased_direct_push_and_deploy
    primary_question: GitHubへ直接pushして本番反映までしてもらえるかを知りたい。
    raw_message: "GitHubにコラボレーター招待しました。修正できたらそのままpushして、本番にも反映してもらえますか？"
    note: 通常 live / #RE。GitHub直接pushと本番反映を明確に止め、修正済みファイルまたは差分返却へ戻す。

  - id: HRC56-005
    stock_id: HRC56-005
    category: external_share_boundary
    route: talkroom
    state: purchased
    user_type: non_engineer
    emotional_tone: helpful
    scenario: external_share_request
    question_type: purchased_google_drive_share
    primary_question: Google Driveにコードを置いてよいか、どう共有すればよいかを知りたい。
    raw_message: "購入しました。コード一式が大きいのでGoogle Driveに置いてURLを送ってもいいですか？それとも別の方法がいいですか？"
    note: 通常 live / #RE。Drive外部共有へ逃がさず、トークルーム内の分割添付や関係ファイルへの絞り込みを案内できるかを見る。

  - id: HRC56-006
    stock_id: HRC56-006
    category: github_external_work_surface
    route: quote_sent
    state: quote_sent
    user_type: non_engineer
    emotional_tone: cautious
    scenario: private_repo_share_question
    question_type: quote_sent_github_or_zip_anxiety
    primary_question: GitHubが分からないので、zip共有でも問題ないかを知りたい。
    raw_message: "GitHubの使い方がよく分かっていません。お願いする場合、支払い後にzipでコードを送る形でも大丈夫ですか？"
    note: 通常 live / #RE。buyer benefit としての `大丈夫です` は自然か、ただし外部作業面へ寄せないかを見る。

  - id: HRC56-007
    stock_id: HRC56-007
    category: delivered_external_work_surface
    route: talkroom
    state: delivered
    user_type: engineer
    emotional_tone: normal
    scenario: doc_explanation_request
    question_type: delivered_pr_comment_request
    primary_question: 納品後、承諾前にGitHub PR上でコメントしてもらえるかを知りたい。
    raw_message: "納品ありがとうございます。修正ファイルと確認手順は受け取りました。確認手順の専門用語が少し難しいので、承諾前にGitHubのPR上でどこを見ればいいかコメントしてもらえますか？"
    note: 通常 live / #RE。軽い補足は受けつつ、GitHub PR上のコメント作業へ広げない。

  - id: HRC56-008
    stock_id: HRC56-008
    category: closed_external_work_surface
    route: message
    state: closed
    user_type: engineer
    emotional_tone: polite
    scenario: closed_external_large_share
    question_type: closed_github_invite_relation_check
    primary_question: クローズ後にGitHub招待すれば、前回修正との関係だけ見てもらえるかを知りたい。
    raw_message: "前回はありがとうございました。クローズ後ですが、似たStripeエラーが出ています。GitHubに招待すれば、前回の修正と関係ありそうかだけ見てもらえますか？実作業が必要なら新規で相談します。"
    note: 通常 live / #RE。closed後にGitHub招待へ乗らず、メッセージ上の概要確認と新規相談導線へ分ける。
