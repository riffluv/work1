    route: message
    state: prequote
    user_type: non_engineer
    emotional_tone: anxious
    scenario: prequote_non_engineer_can_request
    question_type: prequote_non_engineer_can_request
    primary_question: 非エンジニアでも、Stripe決済後に注文が作られない不具合を15,000円で依頼できるか知りたい。
    raw_message: "Stripe決済後に注文が作られないです。エンジニアではないので、どのファイルを送ればいいか分かりません。この状態でも15,000円で依頼できますか？"
    note: 通常 live / #RE。agency_alignment、buyer burden alignment、15,000円、購入後の材料共有を自然につなげる。

  - id: HRC70-002
