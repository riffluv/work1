    route: message
    state: prequote
    user_type: non_engineer
    emotional_tone: urgency_and_guarantee_anxiety
    scenario: prequote_price_timeline_no_guarantee
    question_type: prequote_price_timeline_no_guarantee
    primary_question: 金額、日数、必ず直るかを購入前に知りたい。
    raw_message: "Stripe決済は通るのに注文が作られません。金額と日数を先に知りたいです。急いでいるのですが、購入すれば必ず直りますか？"
    note: 通常 live / #RE。価格・3日目安・成功保証不可・修正可能時の成果物 promise を矛盾なく出す。

