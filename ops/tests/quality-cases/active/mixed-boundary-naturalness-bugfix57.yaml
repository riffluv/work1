version: 1

cases:
  - id: HRC57-001
    stock_id: HRC57-001
    category: mixed_boundary_naturalness
    route: service
    state: prequote
    user_type: non_engineer
    emotional_tone: anxious
    scenario: price_timeline_success_guarantee
    question_type: prequote_price_timeline_success_guarantee
    primary_question: 金額と大まかな日数、購入すれば必ず直るかを知りたい。
    raw_message: "Stripe決済後に注文が作られません。金額と、だいたい何日かかるかを教えてください。購入すれば必ず直りますか？"
    note: 通常 live / #RE。15,000円・3日目安・成功保証不可・修正可能時の成果物を矛盾なくつなげる。

  - id: HRC57-002
    stock_id: HRC57-002
    category: mixed_boundary_naturalness
    route: quote_sent
    state: quote_sent
    user_type: non_engineer
    emotional_tone: helpful
    scenario: quote_sent_external_share_timing
    question_type: quote_sent_drive_github_or_talkroom_zip
    primary_question: 支払い前にDriveやGitHub招待で送るべきか、支払い後のトークルーム共有でよいかを知りたい。
    raw_message: "見積り提案ありがとうございます。コード一式が大きいので、支払い前にGoogle DriveのURLかGitHub招待を送っておいた方がいいですか？支払い後にトークルームで共有する形でも進められますか？"
    note: 通常 live / #RE。協力的な buyer に冷たい否定から入らず、購入前作業・外部共有・GitHub招待を避けてトークルーム共有へ戻す。

  - id: HRC57-003
    stock_id: HRC57-003
    category: mixed_boundary_naturalness
    route: talkroom
    state: purchased
    user_type: non_engineer
    emotional_tone: worried
    scenario: live_secrets_pasted
    question_type: purchased_zip_may_include_env_values
    primary_question: 送ったzipに .env の値が入っていたかもしれないが、このままでよいかを知りたい。
    raw_message: "購入後にzipを送りましたが、もしかすると .env.local にAPIキーやWebhook secretの値が入ったままだったかもしれません。このままで確認できますか？送り直した方がいいですか？"
    note: 通常 live / #RE。raw secret値を扱わず、キー名・設定箇所・関係ファイルへ戻し、buyerの不安を煽りすぎない。

  - id: HRC57-004
    stock_id: HRC57-004
    category: mixed_boundary_naturalness
    route: talkroom
    state: purchased
    user_type: engineer
    emotional_tone: practical
    scenario: direct_push_request
    question_type: purchased_direct_push_prod_deploy
    primary_question: GitHubへ直接pushして、本番反映までしてもらえるかを知りたい。
    raw_message: "GitHubに招待しました。修正できたら、そのままpushしてVercel本番にも反映してもらえますか？こちらで触るのが不安です。"
    note: 通常 live / #RE。直接push・本番反映を止め、修正済みファイルまたは差分と適用手順へ戻す。

  - id: HRC57-005
