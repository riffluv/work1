    raw_message: "納品ありがとうございます。修正ファイルと確認手順は受け取りました。専門用語が少し難しいので、承諾前にどこを確認すればいいか、もう少し分かりやすく説明してもらえますか？ついでに顧客向けFAQや運用マニュアルも作ってもらえますか？"
    note: 通常 live / #RE。承諾前の軽い補足は受けつつ、FAQ/運用マニュアル作成へ広げない。

  - id: HRC57-008
