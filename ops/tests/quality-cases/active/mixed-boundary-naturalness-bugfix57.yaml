    category: mixed_boundary_naturalness
    route: message
    state: closed
    user_type: non_engineer
    emotional_tone: hesitant
    scenario: closed_external_large_share
    question_type: closed_relation_check_external_share_free_fix
    primary_question: クローズ後、DriveやGitHubで材料を送れば前回修正との関係を見てもらえるか、費用が発生する場合は先に分かるかを知りたい。
    raw_message: "クローズ後ですみません。似たStripeエラーが出ています。Google DriveかGitHub招待でログとコードを送れば、前回の修正と関係ありそうか見てもらえますか？実作業が必要で費用が発生する場合は先に教えてほしいです。"
    note: 通常 live / #RE。closed後に外部共有・旧トークルーム継続・実作業promiseへ滑らず、概要見立てと費用発生前の相談を分ける。
