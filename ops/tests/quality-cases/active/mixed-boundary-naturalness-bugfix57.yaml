    category: mixed_boundary_naturalness
    route: talkroom
    state: purchased
    user_type: non_engineer
    emotional_tone: cautious
    scenario: extra_scope_question
    question_type: purchased_multiple_symptoms_extra_fee_anxiety
    primary_question: 注文作成、メール、管理画面反映が同じ原因なら同じ範囲で見られるか、別原因ならどうなるかを知りたい。
    raw_message: "注文が作られない件でお願いしていますが、購入完了メールも届かず、管理画面にも反映されていません。同じ原因なら一緒に見てもらえますか？別原因なら追加料金になる前に教えてほしいです。"
    note: 通常 live / #RE。同一原因なら範囲内、別原因なら先に相談を自然に出し、追加料金やセット修正を断定しない。

