    category: answer_order_weight_mixed
    route: talkroom
    state: delivered
    user_type: non_engineer
    emotional_tone: neutral
    scenario: delivered_reflection_points_only
    question_type: delivered_reflection_points_only
    primary_question: 納品後承諾前に、修正ファイルの反映箇所だけ短く教えてほしい。
    raw_message: "納品ありがとうございます。修正ファイルは受け取りました。本格的な説明資料はいらないので、どこを反映すればいいかだけ短く教えてもらえますか？"
    note: 通常 live / #RE。軽い補足を受けつつ、運用マニュアルや本格資料へ広げず、次アクションを短く返せるかを見る。

  - id: HRC78-008
    stock_id: HRC78-008
    category: answer_order_weight_mixed
    route: message
    state: closed
    user_type: repeat_buyer
    emotional_tone: polite
    scenario: closed_thanks_relation_check
    question_type: closed_thanks_relation_check
    primary_question: クローズ後、前回のお礼を添えつつ、似たStripeエラーと前回修正の関係だけこのメッセージで見てもらえるか知りたい。
    raw_message: "前回はありがとうございました。しばらく問題なかったのですが、似たStripeエラーが出ています。このメッセージでログを送れば、前回の修正と関係あるかだけ見てもらえますか？必要なら新規で相談します。"
    note: 通常 live / #RE。前回のお礼への短い反応、case label distance、closed後の関係確認/実作業分離を自然に扱えるかを見る。
