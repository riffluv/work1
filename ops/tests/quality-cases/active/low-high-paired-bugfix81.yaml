    emotional_tone: practical
    scenario: delivered_where_to_apply
    question_type: delivered_where_to_apply
    primary_question: 納品後、承諾前にどこを反映すればよいかだけ短く知りたい。
    raw_message: "納品ありがとうございます。修正ファイルは受け取りました。承諾前に、どこを反映すればいいかだけ短く教えてください。"
    note: 通常 live / #RE。低リスクのdelivered補足。軽い説明に留め、本格資料・本番反映代行へ広げない。

  - id: HRC81-008
