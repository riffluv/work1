version: 1

cases:
  - id: HRC81-001
    stock_id: HRC81-001
    category: low_high_paired
    route: estimate
    state: quote_sent
    user_type: non_engineer
    emotional_tone: cooperative
    scenario: quote_sent_related_files_after_payment
    question_type: quote_sent_related_files_after_payment
    primary_question: 支払い後に、プロジェクト全部ではなく関係ファイルだけ送ればよいか知りたい。
    raw_message: "見積り提案ありがとうございます。支払い後にファイルを送るとき、プロジェクト全部ではなくStripeと注文作成に関係しそうなファイルだけでも問題ありませんか？"
    note: 通常 live / #RE。低リスクの材料共有。購入後トークルーム共有へ軽く案内しつつ、secret値を含めない線を保てるかを見る。

  - id: HRC81-002
