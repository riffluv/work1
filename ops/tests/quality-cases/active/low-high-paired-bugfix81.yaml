    category: low_high_paired
    route: estimate
    state: quote_sent
    user_type: buyer
    emotional_tone: hesitant
    scenario: quote_sent_github_before_payment_cause_first
    question_type: quote_sent_github_before_payment_cause_first
    primary_question: 支払い前にGitHub招待とログ共有をして、原因だけ先に見てもらえるか知りたい。
    raw_message: "見積り提案ありがとうございます。支払い前にGitHubへ招待するので、先にコードとログを見て原因だけ確認してもらえますか？直りそうなら購入します。"
    note: 通常 live / #RE。高リスクの支払い前作業・GitHub作業面。購入前確認に入らず、支払い後トークルーム内ZIP/添付へ戻せるかを見る。

  - id: HRC81-003
    stock_id: HRC81-003
    category: low_high_paired
    route: message
    state: purchased
    user_type: cooperative_buyer
    emotional_tone: careful
    scenario: purchased_key_names_settings_screenshot
    question_type: purchased_key_names_settings_screenshot
    primary_question: Stripe関連のキー名と設定画面スクショだけで足りるか、値も必要かを知りたい。
    raw_message: "Stripe関連のキー名だけ共有し、設定画面のスクショも送りました。値そのものは送っていません。この情報で確認に入れますか？"
    note: 通常 live / #RE。低リスクのsecret-safe材料。値不要を自然に伝え、次に見る箇所へつなげる。

  - id: HRC81-004
