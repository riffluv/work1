    route: message
    state: purchased
    user_type: buyer
    emotional_tone: polite
    scenario: purchased_progress_short_update
    question_type: purchased_progress_short_update
    primary_question: 購入後、急かさずに現在地だけ短く知りたい。
    raw_message: "昨日ログを送りました。急かすつもりはないのですが、今どこを見ているかだけ短く教えてください。"
    note: 通常 live / #RE。低リスクの進捗確認。negative frame を復唱せず、現在地と次回見通しへ短くつなげる。

  - id: HRC81-006
