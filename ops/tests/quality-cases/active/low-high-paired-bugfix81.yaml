    category: low_high_paired
    route: message
    state: closed
    user_type: repeat_buyer
    emotional_tone: cost_anxiety
    scenario: closed_same_symptom_free_or_repay
    question_type: closed_same_symptom_free_or_repay
    primary_question: クローズ後、同じ原因なら無料なのか、別原因なら再度15,000円なのかを知りたい。
    raw_message: "クローズ後ですが、また同じ症状が出ています。前回と同じ原因なら無料で見てもらえますか？別原因ならもう一度15,000円ですか？"
    note: 通常 live / #RE。高リスクのclosed費用不安。同じ原因・無料・再料金を未確認で断定せず、関係確認と実作業前相談へ分けられるかを見る。
