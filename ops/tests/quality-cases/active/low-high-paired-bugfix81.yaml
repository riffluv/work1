    emotional_tone: urgent
    scenario: purchased_today_fix_cancel_refund
    question_type: purchased_today_fix_cancel_refund
    primary_question: 購入後、本番停止中で今日中に直せるか、難しければキャンセルや返金になるかを知りたい。
    raw_message: "購入後です。本番が止まっているので今日中に直せますか？難しいならキャンセルや返金になるのかも先に知りたいです。"
    note: 通常 live / #RE。高リスクの購入後急ぎ・返金圧。今日中修正保証、返金断定、成果物promiseを強めず、すでに受け取っている材料から見通し共有へ戻せるかを見る。

