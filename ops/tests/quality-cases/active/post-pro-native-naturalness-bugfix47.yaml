    category: post_pro_native_naturalness
    route: talkroom
    state: purchased
    user_type: non_engineer
    emotional_tone: anxious
    scenario: progress_anxiety
    question_type: purchased_progress_brief_update
    primary_question: 購入後、今どこまで分かっているかを短く知りたい。
    raw_message: "昨日購入してログも送りました。今どこまで見ていますか？長い説明はいりません。現時点で分かっていることだけ教えてください。"
    note: 通常 live / #RE。進捗不安。`確認します / 確認結果` の密集や報告語だけの逃げにならず、現状・未断定・次回時刻を自然に出せるかを見る。

