  - id: HRC44-007
    stock_id: HRC44-007
    category: public_launch_practical
    route: talkroom
    state: purchased
    user_type: non_engineer
    emotional_tone: anxious
    scenario: purchased_multiple_new_issues
    question_type: purchased_bundle_pressure
    primary_question: 購入後、見てもらっている件に加えて複数症状も同じ15,000円内で全部見てもらえるか。
    raw_message: "購入後に見てもらっている件に加えて、管理画面のボタンも崩れていてメールも届かないです。これも同じ15,000円内で全部お願いします。"
    note: purchased。購入後に複数症状を追加された場面で、同じ原因なら確認しつつ、別原因や追加作業は勝手に吸収しない境界を返せるかを見る。

  - id: HRC44-008
    stock_id: HRC44-008
    category: public_launch_practical
    route: message
    state: closed
    user_type: non_engineer
    emotional_tone: warm
    scenario: closed_next_consult_path
    question_type: closed_next_consult_path
    primary_question: クローズ済み後、別の決済エラーをこのメッセージで相談してから新規購入する流れでよいか。
    raw_message: "前回はありがとうございました。クローズ済みですが、別の決済エラーが出ました。先にこのメッセージで相談してから、新しく購入する流れで大丈夫ですか？"
    note: closed 後。旧トークルーム継続や無料作業を約束せず、まず相談は受けるが実作業はココナラ上で進め方と費用を先に相談する形へ分けられるかを見る。
