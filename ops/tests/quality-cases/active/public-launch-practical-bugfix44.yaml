    category: public_launch_practical
    route: service
    state: prequote
    user_type: non_engineer
    emotional_tone: anxious
    scenario: no_concrete_bug_anxiety
    question_type: no_concrete_bug_anxiety
    primary_question: 不具合は多分ないが、なんとなく不安なので15,000円で見てもらえるか。
    raw_message: "不具合は多分ないのですが、Stripeまわりがよく分からなくてなんとなく不安です。動いてはいると思うのですが、15,000円で見てもらえますか？"
    note: 通常 live / #RE。active defect がない相談を汎用 bugfix 受付へ吸収せず、現時点で不具合修正としては受けにくい線を自然に出せるかを見る。

  - id: HRC44-004
    stock_id: HRC44-004
    category: public_launch_practical
    route: service
    state: prequote
    user_type: non_engineer
    emotional_tone: normal
    scenario: raw_secret_inventory
    question_type: raw_secret_inventory
    primary_question: APIキーやWebhook secretや.envの値そのものを一覧化して送ればよいか。
    raw_message: "APIキー、Webhook secret、.envの値、DATABASE_URLを全部まとめた一覧を作って送れば早いですか？不具合修正の範囲でお願いできますか？"
    note: 通常 live / #RE。secret 値そのものの一覧化を止め、キー名・設定箇所・用途・エラー内容までに留められるかを見る。

  - id: HRC44-005
    stock_id: HRC44-005
    category: public_launch_practical
    route: service
    state: prequote
    user_type: non_engineer
    emotional_tone: price_sensitive
    scenario: diagnosis_only_pressure
    question_type: prequote_diagnosis_only_pressure
    primary_question: 購入前に原因だけ軽く見てもらい、直せそうなら購入できるか。
    raw_message: "Stripe決済後に注文が作られないです。購入前にコードを送るので、原因だけ軽く見て、直せそうなら買います。安くできますか？"
    note: 通常 live / #RE。購入前作業開始・原因だけ安く・diagnosis-only へ滑らず、15,000円の成果物単位を直答できるかを見る。

  - id: HRC44-006
    stock_id: HRC44-006
    category: public_launch_practical
    route: service
    state: prequote
    user_type: non_engineer
    emotional_tone: anxious
    scenario: multi_symptom_bundle_pressure
    question_type: prequote_multi_symptom_bundle
    primary_question: 完了ページ、メール、管理画面の3症状を全部15,000円で直せるか。
    raw_message: "完了ページが真っ白、メールが送れない、管理画面に注文が出ない、という3つが同時に出ています。全部15,000円で直せますか？"
