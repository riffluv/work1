    emotional_tone: normal
    scenario: price_only_active_defect
    question_type: prequote_price_only_active_defect
    primary_question: Stripe決済後に注文が作られない不具合の金額だけ知りたい。
    raw_message: "Stripe決済後に注文が作られない不具合です。まず金額だけ知りたいです。いくらですか？"
