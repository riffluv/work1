    category: semantic_grounding_practical
    route: message
    state: purchased
    user_type: anxious_buyer
    emotional_tone: cautious
    scenario: purchased_logs_screen_current_read
    question_type: purchased_progress_brief_update
    primary_question: 購入後、ログと画面を送った状態で、今の見立てと追加準備の要否を短く知りたい。
    raw_message: "購入後です。昨日ログと画面を送りました。今の見立てはどのくらいまで出ていますか？追加で準備した方がいいものがあれば教えてください。"
    note: 通常 live / #RE。購入後の現在地説明。未提示の Event ID / Webhook / DB / Stripe記録などを足さず、原因断定も避ける。

