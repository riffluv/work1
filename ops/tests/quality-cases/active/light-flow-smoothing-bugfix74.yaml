    category: light_flow_smoothing
    route: talkroom
    state: purchased
    user_type: non_engineer
    emotional_tone: partial_evidence_question
    scenario: info_sufficiency_check
    question_type: purchased_event_id_without_code
    primary_question: Event ID とVercelログだけで足りるか、コードがまだなくても確認できるか知りたい。
    raw_message: "StripeのEvent IDとVercelログの該当行を送りました。コードはまだ送れていません。この情報だけで足りますか？追加が必要なら教えてください。"
    note: 通常 live / #RE。材料不足を責めず、足りる/足りないを断定しすぎず、必要ファイルの依頼を最小化する。

  - id: HRC74-007
