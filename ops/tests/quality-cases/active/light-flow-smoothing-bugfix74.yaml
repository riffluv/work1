    emotional_tone: apply_anxiety
    scenario: delivered_apply_points_and_deploy
    question_type: delivered_apply_points_and_deploy
    primary_question: 納品後承諾前、反映箇所だけ短く知りたい。本番反映まで頼めるかも知りたい。
    raw_message: "納品ありがとうございます。反映箇所の件だけ短く確認したいです。本番反映までお願いできるなら助かるのですが、そこは範囲外でしょうか？"
    note: 通常 live / #RE。自然な topic organizer としての `反映箇所の件` は残しつつ、本番反映不可と軽い補足を safe_connection で分ける。

  - id: HRC74-008
    stock_id: HRC74-008
    category: light_flow_smoothing
    route: message
    state: closed
    user_type: non_engineer
    emotional_tone: polite_new_product_similarity
    scenario: closed_different_product_same_cause_check
    question_type: closed_different_product_same_cause_check
    primary_question: クローズ後、別商品の注文作成不具合が前回と同じ原因かだけメッセージ上で見てもらえるか知りたい。
    raw_message: "前回はありがとうございました。今回は別商品の決済で注文が作られないみたいです。このメッセージで概要を送って、前回と同じ原因かだけ見てもらえますか？別なら新規で相談します。"
    note: 通常 live / #RE。closed 後のお礼を短く受け、概要確認と実作業を分ける。別商品でも無料/旧トークルーム継続へ滑らないかを見る。
