version: 1

cases:
  - id: HRC74-001
    stock_id: HRC74-001
    category: light_flow_smoothing
    route: message
    state: prequote
    user_type: non_engineer
    emotional_tone: file_selection_anxiety
    scenario: prequote_non_engineer_file_selection
    question_type: prequote_non_engineer_file_selection
    primary_question: コードに詳しくなく、必要ファイルが分からない状態でも依頼できるか、全部送る必要があるか知りたい。
    raw_message: "コードに詳しくなくて、どのファイルを送ればいいか分かりません。Stripe決済後に注文が作られない状態ですが、このまま依頼できますか？全部送る必要がありますか？"
    note: 通常 live / #RE。bugfix73 B02 の塊感を踏まえ、軽い prequote で secret safety と材料共有を安全に近づけられるかを見る。

  - id: HRC74-002
