    route: quote_sent
    state: quote_sent
    user_type: non_engineer
    emotional_tone: preparation_before_payment
    scenario: quote_sent_prepare_materials_after_payment
    question_type: quote_sent_prepare_materials_after_payment
    primary_question: 支払い後すぐ見てもらえるように、支払い前にログやZIPを送っておくべきか知りたい。
    raw_message: "見積り提案ありがとうございます。支払い後すぐ見てもらえるように、今のうちにログやzipを送っておいた方がいいですか？"
    note: 通常 live / #RE。支払い前作業不可を重く出しすぎず、支払い後トークルーム共有の手順へ自然につなげる。

  - id: HRC74-004
    stock_id: HRC74-004
    category: light_flow_smoothing
    route: quote_sent
    state: quote_sent
    user_type: engineer
    emotional_tone: external_work_surface_offer
    scenario: quote_sent_github_invite_readonly
    question_type: quote_sent_github_invite_readonly
    primary_question: GitHub上で確認だけしてもらえるか、pushや公開環境への反映なしなら可能か知りたい。
    raw_message: "見積りありがとうございます。こちらのGitHubに招待したら見てもらえますか？pushや公開環境への反映はしなくていいので、確認だけでもGitHub上でお願いしたいです。"
    note: 通常 live / #RE。GitHubを作業場所にしない境界を残しつつ、成果物は修正済みファイル返却を主軸にする。

  - id: HRC74-005
    stock_id: HRC74-005
    category: light_flow_smoothing
    route: talkroom
    state: purchased
    user_type: non_engineer
    emotional_tone: concise_progress_request
    scenario: purchased_progress_and_today_fixability
    question_type: purchased_progress_and_today_fixability
    primary_question: 購入後にログとスクショ送付済みの状態で、今どこまで分かっているか、本日中に修正できそうか知りたい。
    raw_message: "昨日ログとスクショを送りました。今どこまで分かっていますか？本日中に修正できそうかだけ短く教えてください。"
    note: 通常 live / #RE。短く現在地を返しつつ、本日中修正完了を保証しない。処理文の塊を減らせるかを見る。

  - id: HRC74-006
