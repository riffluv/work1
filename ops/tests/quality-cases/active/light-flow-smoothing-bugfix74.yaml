    category: light_flow_smoothing
    route: message
    state: prequote
    user_type: non_engineer
    emotional_tone: cautious_before_purchase
    scenario: prequote_sample_and_price
    question_type: prequote_sample_and_price
    primary_question: 購入前に納品物見本を確認できるか、金額はいくらか、作業後に何が返るか知りたい。
    raw_message: "購入前に納品物の見本を見たいです。Stripe決済後に注文が作られない不具合だと、金額はいくらで、作業後は何が返ってきますか？"
    note: 通常 live / #RE。価格・見本・成果物を直答しつつ、成果物 promise を強めすぎず、説明を重くしない。

  - id: HRC74-003
