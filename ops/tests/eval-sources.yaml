secondary_sources:
  - path: /home/hr-hm/Project/work/ops/tests/rehearsal/regression-pass-20260330.ja.md
    role: regression_notes
    purpose:
      - 過去 drift 表現の確認
      - current canonical batch の把握
    status: active

  - path: /home/hr-hm/Project/work/ops/tests/rehearsal/archive/raw-batches-2026-04-03.tar.gz
    role: style_regression_archive
    purpose:
      - 返信文の温度感回帰
      - banned phrasing / opening rotation の spot-check
    status: archive_only

usage_rules:
  - 構造変更の評価は primary_sources を優先する
  - rehearsal archive は入力ケースの正本にしない
  - rehearsal archive は文体回帰と禁止表現確認に限定する
  - 新しい renderer / lint の良否判定は holdout を先に通して見る
  - 実ストックの主運用は seed / eval / holdout / edge / renderer_seed の5箱で回す
  - seed は構造変更直後の最小確認、eval は通常改善、holdout は混線防止、edge は事故防止、renderer_seed は contract の正解形確認に使う
