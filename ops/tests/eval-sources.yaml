  - path: /home/hr-hm/Project/work/ops/tests/prequote-bulk-30-v3.txt
    role: eval
    purpose:
      - 難ケースの通常評価
      - 情報不足 / 複数論点 / 感情強め の処理確認
    status: active

  - path: /home/hr-hm/Project/work/ops/tests/prequote-bulk-20-v6.txt
    role: holdout
    purpose:
      - ブラインド検定
      - multi-question / urgency / security / price / purchased / closed の混在確認
    status: active

  - path: /home/hr-hm/Project/work/ops/tests/prequote-bulk-30-v5.txt
    role: holdout
    purpose:
      - 初手で崩れやすい難ケース評価
      - bugfix / boundary / price / secrecy の複合確認
    status: active

  - path: /home/hr-hm/Project/work/ops/tests/prequote-bulk-30-v4.txt
    role: holdout
    purpose:
      - edge に寄った難ケースのブラインド確認
