  - id: BLK-001
    title: "サブスク有効なのにサイト側だけ無料へ戻る"
    service_id: bugfix-15000
    src: service
    state: prequote
    raw_message: "こんにちは。月額課金のサービスを運営しているのですが、昨晩から一部のお客さんが「有料プランなのに無料プランに戻っている」と連絡してきています。Stripeの管理画面ではサブスクリプションは有効のままなのですが、サイト側だけおかしいようです。お客さんからの問い合わせが増えていて困っています。Next.jsとVercelで運用しています。対応できるものか教えてください。"
    user_intent: "対応可否の確認"
    case_type: bugfix
    certainty: high
    service_fit: high
    risk_level: medium
    risk_flags:
      - customer_visible_impact
      - anxious_tone
    scope_judgement: same_cause_likely
    summary: "Stripe上では有効だが、サイト側の会員状態だけ無料へ戻って見える。"
    emotional_caution: true
    ask_count: 0
    missing_info: []
    next_action: "service route のため、そのまま購入判断へ進める"
    human_review_required: false
    reply_generation: ready_to_draft
    reply_stance:
      burden_owner: us
      empathy_first: true
      reply_skeleton: estimate_initial
      answer_timing: now
    reply_contract:
      primary_question_id: q1
      explicit_questions:
        - id: q1
          text: "対応できるものか教えてください。"
          priority: primary
      answer_map:
        - question_id: q1
          disposition: answer_now
          answer_brief: "この状態でも対応できる。"
          evidence_refs:
            - service.scope
            - stripe.subscription_active_but_site_state_wrong
            - nextjs_vercel_in_scope
      ask_map: []
      issue_plan:
        - issue: "対応可否と15,000円範囲の判断"
          disposition: answer_now
          reason: "同一原因の1件として切れる高確度 bugfix で、判断材料も足りている。"
      required_moves:
        - answer_directly_now
        - give_purchase_path
      forbidden_moves:
        - vague_hold_without_reason
        - internal_term_exposure
        - numbered_QA_for_all_questions
