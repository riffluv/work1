version: 1
service_id: handoff-25000
kind: service_pack_fidelity_regression

description: "handoff-25000 の公開準備文面・FAQ・回答例が service-pack の decision / evidence / routing / state に落ちているかを確認する"

cases:
  - id: handoff_faq_01_base_scope
    source: faq
    public_clause_summary: "25,000円で主要1フローを対象に、結論メモと引き継ぎメモを返す。コード修正は含まない"
    expected_contract_refs:
      - facts.public_facts.base_price
      - facts.scope_unit
      - facts.public_facts.deliverables
      - boundaries.out_of_scope

  - id: handoff_faq_02_not_formal_spec
    source: faq
    public_clause_summary: "正式な仕様書ではなく、現状コードを読んで分かったことと次の着手順を整理した実務向けメモ"
    expected_contract_refs:
      - facts.public_facts.includes
      - facts.public_facts.excludes_core
      - decision-contract.primary_goal_rules.handoff_first

  - id: handoff_faq_03_repo_wide_not_default
    source: faq
    public_clause_summary: "リポジトリ全体ではなく、優先度の高い処理の流れ1つを基本とし、全体整理は追加見積り"
    expected_contract_refs:
      - decision-contract.scope_adjudication.one_flow_in_scope
      - decision-contract.scope_adjudication.extra_flow_if_needed
      - boundaries.out_of_scope

  - id: handoff_faq_04_same_or_separate_flow
    source: faq
    public_clause_summary: "複数フローをまとめて見られる場合もあるが、別の流れなら追加フローや対象範囲調整として扱う"
    expected_contract_refs:
      - decision-contract.scope_adjudication.extra_flow_if_needed
      - evidence-contract.handoff_first_class_evidence.extra_flow_or_repair_bundle
      - facts.public_facts.addon_extra_flow

  - id: handoff_faq_05_repair_is_additional
    source: faq
    public_clause_summary: "修正は基本料金に含まれず、整理のあと必要になったら追加対応として続けられる"
    expected_contract_refs:
      - decision-contract.scope_adjudication.repair_as_additional_work
      - decision-contract.additional_work_policy
      - boundaries.out_of_scope

  - id: handoff_faq_06_ai_or_vendor_code_ok
    source: faq
    public_clause_summary: "AIコードでも外注コードでも、主要1フローの現状整理から進める"
    expected_contract_refs:
      - facts.buyer_anxieties.common
      - decision-contract.primary_goal_rules.handoff_first
      - evidence-contract.handoff_first_class_evidence.main_flow_identification

  - id: handoff_faq_07_bugfix_boundary
    source: faq
    public_clause_summary: "コードの中身が分からないだけでは handoff 固定ではなく、まず直したい不具合が明確なら bugfix の方が自然"
    expected_contract_refs:
      - decision-contract.primary_goal_rules.bugfix_first
      - boundaries.boundary_principles
      - routing-playbooks.boundary_bugfix_vs_handoff

  - id: handoff_purchase_note_01_minimum_prequote
    source: purchase_note
    public_clause_summary: "見積り相談では、一番困る操作や既存メモだけでもよく、コード一式はまだ不要"
    expected_contract_refs:
      - evidence-contract.phase_minimums.prequote
      - evidence-contract.attachment_policy.full_repo
      - evidence-contract.buyer_facing_promises

  - id: handoff_answer_example_01_first_flow_guess
    source: answer_example
    public_clause_summary: "前任者不在で決済周りが分からない時、最初に見る1フロー案を置き、購入後にコード共有を依頼する"
    expected_contract_refs:
      - routing-playbooks.prequote_handoff_accept
      - decision-contract.scope_adjudication.one_flow_in_scope
      - evidence-contract.phase_minimums.prequote

  - id: handoff_answer_example_02_progress_update
    source: answer_example
    public_clause_summary: "取引中の進捗確認では、どこまで確認できたか、次にどこを見るか、いつ返すかを短く返す"
    expected_contract_refs:
      - routing-playbooks.purchased_handoff_progress_update
      - state-schema.promised_next_action

  - id: handoff_answer_example_03_repair_followup
    source: answer_example
    public_clause_summary: "整理のあと修正に進むことは可能だが、まず整理を行い、その後追加対応として案内する"
    expected_contract_refs:
      - routing-playbooks.quote_sent_handoff_scope_confirm
      - decision-contract.scope_adjudication.repair_as_additional_work
      - decision-contract.additional_work_policy
