cases:
  - case_id: TSAFE-001
    text: |
      Stripe 側では送信成功になっているので、Webhook の受け口側の可能性が高いです。
    expect_warning: true

  - case_id: TSAFE-002
    text: |
      おそらく API Routes 側のバリデーションで止まっています。
    expect_warning: true

  - case_id: TSAFE-003
    text: |
      いまの症状だと、原因は環境差と思われます。
    expect_warning: true

  - case_id: TSAFE-004
    text: |
      Stripe 側で送信成功になっているとのことなので、まずは受信側でどこまで届いているかを確認します。
    expect_warning: false

  - case_id: TSAFE-005
    text: |
      いまの時点ではまだ原因は断定しません。まずは受信側のログや反応を確認するのが近いです。
    expect_warning: false

  - case_id: TSAFE-006
    text: |
      いまの状況だと、Webhook の受け口側の可能性が高く、まずは受信側ログを見ます。
    expect_warning: true

  - case_id: TSAFE-007
    text: |
      API Routes 側の線が濃いので、まずはその周辺を確認します。
    expect_warning: true

  - case_id: TSAFE-008
    text: |
      まだ断定はしません。まずは API Routes と受信ログのどこで止まっているかを確認します。
    expect_warning: false
