service_id: bugfix-15000

playbooks:
  prequote_bugfix_accept:
    trigger:
      - "直したい"
      - "決済は通るのに反映されない"
      - "本番だけ失敗する"
    objective: "対応可否と15,000円の範囲を返し、最小情報だけ聞く"
    must_say:
      - "15,000円は調査だけで終わる形ではない"
      - "原因不明のまま正式納品へ進めない"
      - "追加料金は自動で発生しない"
    ask_shape:
      - "画面"
      - "文言"
      - "発生日時"

  prequote_success_rate_fear:
    trigger:
      - "どれくらいの確率で直るか"
      - "調査だけで終わるのが怖い"
    objective: "保証はしないが、15,000円で返る価値を先に示す"
    must_say:
      - "割合固定では言えない"
      - "判断できないまま終わらせない"

  quote_sent_scope_confirm:
    trigger:
      - "購入前に1点確認"
      - "原因がWebhookではなく別層でも見てもらえるか"
    objective: "範囲確認と追加対応境界を返す"
    must_say:
      - "15,000円は原因確認から修正・確認手順・修正済みファイルの返却まで進める前提"
      - "別の大きい改修が必要なら、その時点で追加対応を相談"
    state_contract:
      promised_next_action:
        action: "現在の症状が15,000円の範囲に入るかを先に返す"
        return_timing: next_reply
        owner: codex

  purchased_related_secondary:
    trigger:
      - "今見てもらってる件とは別に"
      - "急ぎではないが"
    objective: "primary symptom を優先しつつ、secondary symptom の行き先を明示する"
    must_say:
      - "同じ原因かどうかをまず確認"
      - "急ぎ度に応じて優先順位を返す"
    state_contract:
      secondary_symptom:
        default_disposition: same_cause_check
        preferred_return_timing: with_delivery
        fallback_return_timing: before_close
        default_required_input:
          - "画面"
          - "文言"
      promised_next_action:
        action: "primary symptom を優先して原因を確認し、secondary symptom の同一原因可否を返す"
        return_timing: with_delivery
        owner: codex

  delivered_impact_check:
    trigger:
      - "今回触っていないはずの"
      - "これも影響ありますか"
    objective: "防御せず、同じ流れでの影響確認へつなげる"
    must_say:
      - "直接触っていない箇所でも関連分岐で見え方が変わることはある"
    state_contract:
      secondary_symptom:
        default_disposition: same_cause_check
        preferred_return_timing: before_close
        default_required_input:
          - "画面"
          - "文言"
      unresolved_thread:
        planned_resolution: "今回の変更と同じ原因か、別依頼かを返す"
        return_timing: before_close

  closed_repeat_scope_first:
    trigger:
      - "また同じエラー"
      - "前回の範囲で見てもらえるか"
      - "返金してほしいと言われている"
    objective: "無料保証を約束せず、まず再発か新規かを返す"
    must_say:
      - "前回の修正とつながっている再発かを確認"
      - "続きとして扱えるか、新しい依頼になるかを先に返す"
    state_contract:
      promised_next_action:
        action: "再発か新しい依頼かを先に返す"
        return_timing: next_reply
        owner: codex

  closed_repeat_discount_firm:
    trigger:
      - "少し安くならないか"
      - "前回の流れを知っている分"
    objective: "値引きは断るが、硬くしすぎず正規導線へ戻す"
    must_say:
      - "料金は今回の内容ごとに判断している"
      - "症状を見て15,000円で対応できるかを返す"
    state_contract:
      promised_next_action:
        action: "今回の症状が15,000円で扱えるかを返す"
        return_timing: next_reply
        owner: codex

  boundary_bugfix_first:
    trigger:
      - "修正から入るべきか整理を先にやるべきか分からない"
      - "コード全体がぐちゃぐちゃ"
    objective: "buyer に選択を返さず、bugfix 先行で routing する"
    must_say:
      - "今出ている不具合を止めるのが先なら、まずは不具合修正から"
      - "整理は必要だと分かった時点で別に考えられる"
    state_contract:
      promised_next_action:
        action: "まず止めるべき primary symptom を固定する"
        return_timing: next_reply
        owner: codex

source_refs:
  estimate_decision: "/home/hr-hm/Project/work/ops/services/next-stripe-bugfix/estimate-decision.yaml"
  scope_matrix: "/home/hr-hm/Project/work/ops/services/next-stripe-bugfix/scope-matrix.md"
