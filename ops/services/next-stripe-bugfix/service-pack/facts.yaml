service_id: bugfix-15000
kind: bugfix
public: true

public_name: "Next.js/Stripe不具合診断・修正"
one_line_goal: "決済は通るのに反映されない不具合を、原因特定から修正まで進める"

public_facts:
  base_price: 15000
  addon_extra_fix: 15000
  target_stack:
    - Next.js
    - Stripe
    - API連携
  includes:
    - 同一原因の不具合1件の原因確認
    - 修正
    - 確認手順の共有
    - 修正済みファイルの返却
  deliverables:
    - 調査結果と修正内容の報告
    - 修正済みZIPまたはpatch
    - 動作確認メモ
  reply_expectation:
    first_result_target: "必要情報がそろい次第48時間以内を目標に一次結果"

internal_reply_expectation:
  initial_reply: "24時間以内（通常数時間以内）"
  note: "内部運用目安。公開ページに同粒度で出ていないため、buyer へ毎回 public fact として案内しない。"

prequote_sample_policy:
  can_send_sample_deliverable: true
  sample_is_generic: true
  must_not_include_actual_diagnosis: true
  must_not_require_code_or_logs_before_payment: true
  public_basis: "購入前に納品物の見本もお送りします。"
  wording_note: "納品物の見本は、実際のコード診断や原因特定ではなく、納品形式のイメージとして案内する。"

scope_unit:
  rule: "same_cause_and_same_flow_and_same_endpoint"
  same_cause_principle: "修正箇所数ではなく原因で判定する"
  public_wording_note: "外向けには主に「同一原因」「処理の流れが異なる場合は別件」と説明する。endpoint は内部判定の補助軸であり、購入者向けに毎回出さない。"

phase_rules:
  prequote:
    can_offer:
      - 対応可否
      - 15,000円の範囲説明
      - 進め方の見立て
    can_ask_for:
      - 症状が分かる画面
      - 文言
      - 発生日時
      - 公開中のサイトだけか / 自分のPCでも起きるか
    must_not_do:
      - ZIPやコード一式の前のめり要求
      - 本番操作の引き受け
      - secrets の要求
  quote_sent:
    can_offer:
      - 範囲確認
      - 追加対応境界
      - 購入後の初動
    can_ask_for:
      - 購入判断に必要な最小確認
    must_not_do:
      - prequote 的な generic ask へ戻る
  purchased:
    can_offer:
      - 対象症状の固定
      - 進捗共有
      - 関連症状の disposition
    can_ask_for:
      - reproduction_steps
      - error_logs
      - stack_runtime_hosting
    must_not_do:
      - スコープ未整理のまま secondary symptom を閉じる
  delivered:
    can_offer:
      - 変更点
      - 確認点
      - 同一原因の影響確認
    can_ask_for:
      - 影響が分かる画面
      - 文言
    must_not_do:
      - 防御的な反論
      - 未解決 secondary symptom の放置
  closed:
    can_offer:
      - 再発か新規かの確認
      - 値引き不可の事実
      - 今回の続きとして扱えるかの判断
    can_ask_for:
      - 再発箇所の画面
      - 文言
    must_not_do:
      - 一律保証の約束
      - 公開前サービスへの誘導

buyer_anxieties:
  common:
    - "調べただけで終わるのでは"
    - "勝手に追加料金になるのでは"
    - "同じ原因なら今回に含まれるのか"
    - "本番だけ起きるので説明しづらい"
    - "コードの中身が分からない"

buyer_burden_hotspots:
  - "関係ファイルの選定"
  - "Stripe / Webhook / DB / API の原因候補選定"
  - "ローカル・本番・Vercel など環境差分の説明"
  - "AI生成コードや引き継ぎコードの構造把握"

safe_default_inputs_by_phase:
  prequote:
    - "症状"
    - "本来の動き"
    - "今起きている現象"
    - "エラーログまたはスクショ"
    - "Stripe Event ID が分かる場合は evt_... のID"
    - ".env は値ではなくキー名のみ"
  quote_sent:
    - "お支払い完了後にトークルームで共有する流れを案内する"
    - "支払い前にコード確認・原因確認を始めない"
    - "軽い手順確認では、通常フローを先に案内する"
  purchased:
    - "コード一式ZIP"
    - "エラーログ"
    - "スクショ"
    - "再現手順"
    - "Stripe Event ID が分かる場合は evt_... のID"
    - ".env / APIキー / Webhook Secret / DB接続文字列の値は除外"

must_not_push_back_to_buyer:
  - "コードに詳しくない buyer に、関係ファイルの選定を戻しすぎない"
  - "AI生成コードや引き継ぎコードで構造が分からない buyer に、原因候補や優先順位の判断を戻しすぎない"
  - "どのファイルが関係するか分からない buyer へ、分かる範囲の関係ファイルだけを標準案内にしない"
  - "安全な既定入力を出せる場面では、コード一式ZIP + secret除外 + ログ/スクショへ寄せる"

source_refs:
  service_page: "/home/hr-hm/Project/work/サービスページ/bugfix-15000.live.txt"
  service_yaml: "/home/hr-hm/Project/work/ops/services/next-stripe-bugfix/service.yaml"
  service_registry: "/home/hr-hm/Project/work/os/core/service-registry.yaml"
