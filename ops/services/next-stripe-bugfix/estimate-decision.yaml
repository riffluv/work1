version: 1
description: "見積り相談の受注判定。購入前の受注可否と、15,000円で進めるか / 保留 / 断る を決める。"

inputs:
  - service_fit
  - cause_estimate
  - info_sufficiency
  - workload

decisions:
  accept_15k:
    label: "15,000円で受注"
    when: "高適合で、同一原因の1件として見積れるとき"
    conditions:
      service_fit:
        - high
      cause_estimate:
        - single
      info_sufficiency:
        - decidable
      workload:
        - within_base
    template_ref: "§11"
    notes:
      - "同一原因の1フロー / 1エンドポイントとして説明できる場合"
      - "購入後は修正差分またはZIP、確認手順まで対応する"

  hold:
    label: "保留（追加質問1回）"
    when: "適合はあるが、原因も情報も不足していて判定不能なとき"
    conditions:
      service_fit:
        - high
        - medium
        - unknown
      cause_estimate:
        - unknown
        - unknown_but_narrow
      info_sufficiency:
        - undecidable
        - partial
      workload:
        - unknown
        - within_base
    template_ref: "§13-3"
    rules:
      max_additional_questions: 1
    notes:
      - "追加質問は1回まで"
      - "回答後も判定不能なら辞退または人手確認へ倒す"

  decline:
    label: "断る"
    when: "範囲外、新機能、新規実装級で現行サービスに乗せない方が安全なとき"
    conditions:
      service_fit:
        - low
        - out_of_scope
      cause_estimate:
        - new_feature
        - multiple_independent
      workload:
        - new_implementation
        - too_broad
    template_ref: "§18"
    notes:
      - "現行サービス範囲外"
      - "別提案が自然な場合だけ別提案を案内する"

rules:
  - "見積り経路では有料オプションが使えないため、提案金額で完結する前提で判断する"
  - "現在の公開 bugfix サービスに、5,000円の確認専用プランはない"
  - "15,000円は、原因確認から修正・確認手順・修正済みファイルの返却まで進める前提で案内する"
  - "原因不明のまま正式納品へ進めない"
  - "別原因が見つかった場合だけ、その時点で先に相談する"
  - "保留は最大1回。2回目も判定不能なら decline または人手確認に倒す"
  - "価格に影響する判断は human_review_when に従う"
  - "確認だけしたい相談でも、公開案内では 15,000円 の範囲説明で統一する"
