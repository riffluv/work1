service_id: handoff-25000

thread_state:
  target_flow:
    type: string
    required_from: prequote
    description: "今回整理する主フロー"
  intended_reader:
    type: enum
    values:
      - self
      - next_engineer
      - internal_team
      - unknown
  secondary_threads:
    type: list
    item:
      thread: string
      disposition: later_check|repair_as_additional_work|separate_followup|closed
      return_timing: before_delivery|with_delivery|before_close|with_close|after_close_followup
      required_input: string|none
    description: "補足依頼や修正追加など、主フロー以外の論点"
  current_route:
    type: enum
    values:
      - prequote_handoff_accept
      - prequote_handoff_non_engineer
      - boundary_bugfix_vs_handoff
      - quote_sent_handoff_scope_confirm
      - delivered_handoff_deeper_memo
  unresolved_threads:
    type: list
    item:
      thread: string
      planned_resolution: string
      return_timing: before_delivery|with_delivery|before_close|with_close|after_close_followup
      required_input: string|none
  promised_next_action:
    type: object
    fields:
      action: string
      return_timing: immediate|next_reply|before_delivery|with_delivery|before_close|with_close
      owner: codex|buyer|shared
  scope_status:
    type: enum
    values:
      - one_flow
      - extra_flow_if_needed
      - repair_as_additional_work
      - out_of_scope

minimum_rules:
  - "main flow が未確定でも、一番困る操作を state に残す"
  - "修正追加の話は、handoff 本体と別 thread として残す"
  - "delivery / close では、補足依頼の扱いと費用境界だけでなく return_timing も明示する"
  - "secondary_threads は disposition だけでなく return_timing か required_input のどちらかを持つ"
