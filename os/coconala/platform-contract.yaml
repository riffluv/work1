version: 1
platform: coconala
last_verified: 2026-04-29

purpose: >
  Coconala 全サービス共通の取引仕様と返信ガイダンス。
  価格・スコープは service-registry.yaml / service.yaml を正本とし、
  このファイルは「購入前/購入後/正式納品/完了」の場の違いを補う。

applies_in_modes:
  - coconala
  - delivery

authority_split:
  platform_contract: /home/hr-hm/Project/work/os/coconala/platform-contract.yaml
  service_contract: /home/hr-hm/Project/work/os/core/service-registry.yaml
  case_context:
    - /home/hr-hm/Project/work/runtime/replies/latest-source.txt
    - /home/hr-hm/Project/work/runtime/replies/latest.txt
    - reply_memory
    - /home/hr-hm/Project/work/ops/cases/open/{case_id}/README.md

source_precedence:
  rule: >
    現行の support.zendesk.com 公式ヘルプを最優先する。
    古いココナラニュース、サービス出品ページ、非公式ブログ、ユーザー投稿が現行ヘルプと衝突する場合は、
    外向け文面や validator の根拠にしない。
  conflict_note: >
    とくに closed 後のおひねり / 追加購入について、古いニュースや一部サービスページは
    「クローズ後の追加支払い」を連想させるが、現行ヘルプでは closed 後に
    トークルームでの投稿・ファイル投稿・おひねり等の追加購入はできない。
    closed 後の標準導線は、メッセージ上で確認し、実作業が必要なら見積り提案または新規依頼へ戻すこと。

not_duplicated_here:
  - no_external_contact
  - no_external_share
  - no_external_payment
  - no_direct_push
  - no_prod_deploy
  - no_raw_secret_values

confidence_levels:
  official:
    usage: >
      公式UI / 公式ヘルプ / 公式ガイドと整合する前提で、必要なら外向け文面にも直接使ってよい。
  mixed:
    usage: >
      公式情報を含む調査メモから整理した項目。外向けでは断定しすぎず、
      「プラットフォーム手続きに沿って確認します」のように cautious に使う。
  operational:
    usage: >
      Workspace 内の返信運用ルール。外向けに「ココナラ仕様」として断定せず、
      writer / lint / self-check のガイダンスとして使う。

facts:
  internal_phase_mapping:
    summary: >
      prequote / quote_sent / purchased / delivered / closed は公式UI名ではなく、Workspace 内部の返信生成用 state。
      prequote は見積り提案前の購入前相談、quote_sent は見積り提案済みだが入金完了前、
      purchased は入金完了後にトークルームが開いた取引中、
      delivered は正式な納品後かつクローズ前、
      closed は完了としてクローズ済みのトークルームとして扱う。
      cancelled は closed に含めず、キャンセル成立済みの別状態として扱う。
    confidence: operational
    outward_assertion: cautious
    source_refs:
      - /home/hr-hm/Project/work/docs/reply-quality/state-schema-minimal-contract.ja.md

  message_vs_talkroom:
    summary: >
      メッセージは主に購入前またはクローズ後の連絡、トークルームは購入後の取引空間として扱う。
    confidence: official
    outward_assertion: direct
    source_refs:
      - https://coconala-support.zendesk.com/hc/ja/articles/218721057-%E3%83%A1%E3%83%83%E3%82%BB%E3%83%BC%E3%82%B8%E6%A9%9F%E8%83%BD%E3%81%AB%E3%81%A4%E3%81%84%E3%81%A6

  closed_talkroom_locked:
    summary: >
      トークルームのクローズ後は、トークルーム内でのメッセージ投稿、ファイル投稿、おひねり等の追加購入ができない。
      クローズ後の連絡窓口はメッセージ機能になる。
      一度クローズしたトークルームを取引中に戻すことや、承諾を取り消すことはできない。
    confidence: official
    outward_assertion: direct
    source_refs:
      - https://coconala-support.zendesk.com/hc/ja/articles/218723147-%E3%83%88%E3%83%BC%E3%82%AF%E3%83%AB%E3%83%BC%E3%83%A0%E3%81%AE%E3%82%AF%E3%83%AD%E3%83%BC%E3%82%BA%E5%BE%8C%E3%81%AB%E8%BF%BD%E5%8A%A0%E3%81%AE%E8%B3%AA%E5%95%8F%E3%82%84%E4%BE%9D%E9%A0%BC%E3%82%92%E3%81%97%E3%81%9F%E3%81%84

  estimate_proposal_flow:
    summary: >
      見積もり相談では、相談 -> 出品者の見積もり提案 -> buyer の承認/購入、の流れがある。
      Workspace の quote_sent は見積り提案済みだが入金完了前の段階で、トークルームが開くのは入金完了後。
    confidence: official
    outward_assertion: direct
    source_refs:
      - https://coconala-support.zendesk.com/hc/ja/articles/900004238843-%E8%A6%8B%E7%A9%8D%E3%82%8A%E6%A9%9F%E8%83%BD%E3%81%AB%E3%81%A4%E3%81%84%E3%81%A6-%E5%87%BA%E5%93%81%E8%80%85%E5%90%91%E3%81%91
      - https://coconala-support.zendesk.com/hc/ja/articles/360004889793-%E8%A6%8B%E7%A9%8D%E3%82%8A%E6%8F%90%E6%A1%88%E3%81%AE%E8%B3%BC%E5%85%A5%E6%9C%9F%E9%99%90

  category_minimum_price_exists:
    summary: >
      ココナラではカテゴリにより最低サービス価格が定められており、0円の見積り提案や0円の通常取引を前提にしない。
      サービス固有の最低価格は service.yaml 側に置く。
      closed 後に実際のコード修正・差し替えファイル作成・修正済みファイル返却が必要な場合は、
      こちら起因の可能性があっても、ココナラ上で進められる新しい取引導線と費用を先に確認・相談する。
    confidence: official
    outward_assertion: cautious
    source_refs:
      - https://coconala-support.zendesk.com/hc/ja/articles/360020963554-%E3%82%AB%E3%83%86%E3%82%B4%E3%83%AA%E3%81%94%E3%81%A8%E3%81%AE%E6%9C%80%E4%BD%8E%E3%82%B5%E3%83%BC%E3%83%93%E3%82%B9%E4%BE%A1%E6%A0%BC
      - /home/hr-hm/Project/work/ops/services/next-stripe-bugfix/service.yaml

  formal_delivery_exists:
    summary: >
      「正式な納品」は通常メッセージと別の操作で、送信後はクローズ手続きに入る前提で扱う。
      Workspace の delivered は正式な納品後かつクローズ前の state。
      ただし一回目の正式な納品後と、差し戻し後の二回目の正式な納品後では buyer ができることが異なるため、
      一回目か二回目か不明な時に「差し戻しできます」と外向けに一般化しない。
    confidence: official
    outward_assertion: direct
    source_refs:
      - https://coconala-support.zendesk.com/hc/ja/articles/4402957809049-%E7%B4%8D%E5%93%81%E7%A2%BA%E8%AA%8D%E3%81%AB%E3%81%A4%E3%81%84%E3%81%A6-%E8%B3%BC%E5%85%A5%E8%80%85%E5%90%91%E3%81%91
      - https://coconala-support.zendesk.com/hc/ja/articles/4403291547417-%E3%83%88%E3%83%BC%E3%82%AF%E3%83%AB%E3%83%BC%E3%83%A0%E3%81%AE%E3%82%AF%E3%83%AD%E3%83%BC%E3%82%BA%E6%9D%A1%E4%BB%B6%E3%81%AB%E3%81%A4%E3%81%84%E3%81%A6

  first_reply_after_purchase_deadline:
    summary: >
      購入後、出品者から 48 時間以内に一度もメッセージが送られない場合は自動キャンセルの対象になる。
      Workspace ではこれを内部SLOではなく platform fact として扱う。
    confidence: official
    outward_assertion: cautious
    source_refs:
      - https://coconala-support.zendesk.com/hc/ja/articles/218722887-%E5%87%BA%E5%93%81%E8%80%85%E3%81%8B%E3%82%89%E9%80%A3%E7%B5%A1%E3%81%8C%E3%81%AA%E3%81%84

  silence_cancel_risk:
    summary: >
      purchased 中に出品者からの連絡が 4 日以上途絶えると、
      購入者側からキャンセルリクエスト可能になる条件がある。
    confidence: official
    outward_assertion: cautious
    source_refs:
      - https://coconala-support.zendesk.com/hc/ja/articles/218722887-%E5%87%BA%E5%93%81%E8%80%85%E3%81%8B%E3%82%89%E9%80%A3%E7%B5%A1%E3%81%8C%E3%81%AA%E3%81%84
      - https://coconala-support.zendesk.com/hc/ja/articles/218179858-%E8%B3%BC%E5%85%A5%E8%80%85%E3%81%8B%E3%82%89%E9%80%A3%E7%B5%A1%E3%81%8C%E3%81%AA%E3%81%84

  additional_payment_before_close:
    summary: >
      おひねり等の追加支払いは、トークルームが開いている間の追加支払い手段として扱う。
      承諾後でもクローズ前の一定期間は可能な場合があるが、closed 後の導線として案内しない。
      closed 後はトークルーム内のおひねり等の追加購入ができない。
      どの経路で支払われた金額かによって取消方法や扱いは分かれる。
    confidence: official
    outward_assertion: cautious
    source_refs:
      - https://coconala-support.zendesk.com/hc/ja/articles/218723147-%E3%83%88%E3%83%BC%E3%82%AF%E3%83%AB%E3%83%BC%E3%83%A0%E3%81%AE%E3%82%AF%E3%83%AD%E3%83%BC%E3%82%BA%E5%BE%8C%E3%81%AB%E8%BF%BD%E5%8A%A0%E3%81%AE%E8%B3%AA%E5%95%8F%E3%82%84%E4%BE%9D%E9%A0%BC%E3%82%92%E3%81%97%E3%81%9F%E3%81%84
      - https://coconala-support.zendesk.com/hc/ja/articles/900001972863-%E3%81%8A%E3%81%B2%E3%81%AD%E3%82%8A-%E6%9C%89%E6%96%99%E3%82%AA%E3%83%97%E3%82%B7%E3%83%A7%E3%83%B3-%E4%B8%80%E9%83%A8%E9%87%91%E9%A1%8D%E3%81%AE%E3%82%AD%E3%83%A3%E3%83%B3%E3%82%BB%E3%83%AB%E6%96%B9%E6%B3%95-%E5%87%BA%E5%93%81%E8%80%85%E5%90%91%E3%81%91

  service_scope_vs_payment_route:
    summary: >
      bugfix / handoff / neither の判定は、サービス範囲・成果物・料金単位の判定である。
      同じトークルーム内で追加支払いできるか、有料オプションかおひねりか、新規依頼へ戻すかは、
      取引状態に応じた支払い導線の判定であり、サービス範囲を混ぜる根拠にしない。
      追加対応が可能な場合でも、自動追加料金、セット料金化、後続サービス前提、同日対応保証として案内しない。
    confidence: operational
    outward_assertion: cautious
    source_refs:
      - additional_payment_before_close
      - /home/hr-hm/Project/work/os/core/service-registry.yaml

  cancel_refund_shape:
    summary: >
      キャンセルや返金はプラットフォーム手続きに沿う話として扱い、
      出品者側がこの場で可否や金額を断定しない。
      公式ヘルプ上の返金説明は、トークルームでキャンセルが成立した場合を起点にしている。
      一部金額の取消は、支払った経路やタイミングで処理方法が分かれる。
      直接の金銭のやり取りや、口座などの個人情報をやり取りする案内はしない。
    confidence: official
    outward_assertion: cautious
    source_refs:
      - https://coconala-support.zendesk.com/hc/ja/articles/218119178-%E3%82%AD%E3%83%A3%E3%83%B3%E3%82%BB%E3%83%AB%E3%81%AB%E3%81%AA%E3%81%A3%E3%81%9F%E5%A0%B4%E5%90%88%E3%81%AE%E8%BF%94%E9%87%91%E6%96%B9%E6%B3%95
      - https://coconala-support.zendesk.com/hc/ja/articles/900001972863-%E3%81%8A%E3%81%B2%E3%81%AD%E3%82%8A-%E6%9C%89%E6%96%99%E3%82%AA%E3%83%97%E3%82%B7%E3%83%A7%E3%83%B3-%E4%B8%80%E9%83%A8%E9%87%91%E9%A1%8D%E3%81%AE%E3%82%AD%E3%83%A3%E3%83%B3%E3%82%BB%E3%83%AB%E6%96%B9%E6%B3%95-%E5%87%BA%E5%93%81%E8%80%85%E5%90%91%E3%81%91
      - https://coconala-support.zendesk.com/hc/ja/articles/218643857-%E3%83%88%E3%83%BC%E3%82%AF%E3%83%AB%E3%83%BC%E3%83%A0%E3%81%AE%E3%82%AD%E3%83%A3%E3%83%B3%E3%82%BB%E3%83%AB%E6%96%B9%E6%B3%95-%E5%87%BA%E5%93%81%E8%80%85%E5%90%91%E3%81%91

  rejection_limit_exists:
    summary: >
      差し戻しは原則 1 回のみで、2 回目の正式な納品後は差し戻し/承諾ボタンの再表示はされない。
    confidence: official
    outward_assertion: direct
    source_refs:
      - https://coconala-support.zendesk.com/hc/ja/articles/4402957809049-%E7%B4%8D%E5%93%81%E7%A2%BA%E8%AA%8D%E3%81%AB%E3%81%A4%E3%81%84%E3%81%A6-%E8%B3%BC%E5%85%A5%E8%80%85%E5%90%91%E3%81%91

guidance:
  - id: do_not_mix_channels
    when:
      - prequote
      - quote_sent
      - purchased
      - delivered
      - closed
    rule: >
      prequote ではトークルーム前提の文言を書かない。
      quote_sent も入金完了前として扱い、トークルームで続ける / 作業中 / 納品後のような文面を出さない。
      purchased / delivered ではトークルーム前提で返し、クローズ後だけメッセージへ戻す。
      closed 後は、旧トークルームでの投稿・ファイル送付・追加購入・継続作業を前提にしない。
      まずメッセージ上で前回との関係を確認し、実作業が必要なら見積り提案または新規依頼へ戻す。
    based_on:
      - internal_phase_mapping
      - message_vs_talkroom
      - closed_talkroom_locked

  - id: quote_sent_is_not_started_work
    when:
      - quote_sent
    rule: >
      quote_sent は見積り提案済みでも、入金完了前なら取引開始済みとして扱わない。
      buyer の不安には提案内容・範囲・購入後の流れで答え、トークルーム open や作業開始を前提にしない。
      「もう作業を始められるか」と聞かれた場合は、現時点では実作業を開始せず、
      購入・入金完了後にトークルームが開いてから正式に作業開始することを返す。
      購入前は、必要情報の確認や進め方の整理までに留める。
    based_on:
      - internal_phase_mapping
      - estimate_proposal_flow

  - id: keep_platform_and_service_separate
    when:
      - all_coconala_replies
    rule: >
      このファイルは「場の仕様」を扱う。価格・スコープ・追加料金単位は service-registry.yaml と service.yaml を正本にする。
    based_on:
      - estimate_proposal_flow
      - category_minimum_price_exists

  - id: keep_service_boundary_and_payment_route_separate
    when:
      - prequote
      - quote_sent
      - purchased
      - delivered
      - closed
    rule: >
      サービス判定では、bugfix / handoff / neither を先に分ける。
      「同じトークルーム内で続けられるか」「有料オプションかおひねりか」「新規依頼へ戻すか」は、
      その後の取引状態に応じた支払い導線として扱う。
      通常返信や #BR の route gold では、buyer が支払い方法を聞いていない限り、
      「別成果物」「別対応」「進め方と費用を先に相談」までに留める。
      取引中で buyer が追加対応方法を明示的に聞いた時だけ、状態に合わせてトークルーム内の追加支払い導線を案内する。
      closed 後は旧トークルーム内のおひねりや追加購入へ誘導しない。
    based_on:
      - service_scope_vs_payment_route
      - additional_payment_before_close
      - closed_talkroom_locked

  - id: do_not_assert_refund_mechanics
    when:
      - purchased
      - delivered
      - closed
    rule: >
      キャンセル / 返金では、出品者が最終判断者のように書かない。
      purchased / delivered では「取引状況に沿って確認します」「プラットフォーム手続きに沿う話になります」を基本にする。
      closed 後はこれだけだと曖昧なので、旧トークルームが閉じていること、
      まずメッセージ上で前回修正との関係を見ること、実作業が必要なら見積り提案または新規依頼へ戻すことを明示する。
      closed 後に「キャンセルを含めて相談します」とだけ書かない。
      closed 後の返金要求では、前回補足で済む確認か、実作業が必要な新規導線かを切り分ける着地まで返す。
    based_on:
      - cancel_refund_shape
      - closed_talkroom_locked

  - id: delivered_not_closed
    when:
      - delivered
    rule: >
      delivered は正式な納品後でもクローズ前として扱い、closed 後のメッセージ導線へ早く戻しすぎない。
      ただし、一回目の正式な納品か二回目の正式な納品か不明な時は、
      差し戻し可否や回数を外向けに言い切らず、まずトークルーム内で合意内容との差異を確認する。
    based_on:
      - internal_phase_mapping
      - formal_delivery_exists
      - rejection_limit_exists

  - id: closed_refund_request_guard
    when:
      - closed
    rule: >
      クローズ後の返金要求では、旧トークルームを取引中に戻す、承諾を取り消す、
      旧トークルーム内で返金/キャンセルを進める、という前提を書かない。
      まず「返金可否はここで断定できない」「トークルームは閉じている」
      「メッセージ上で前回修正との関係を確認する」を返す。
      最後は、前回補足で済む確認か、実作業が必要な新規見積り/新規依頼かを切り分ける導線に着地させる。
      ココナラ取引の返金と、依頼者サービス側の Stripe 顧客返金を混同しない。
    based_on:
      - closed_talkroom_locked
      - cancel_refund_shape

  - id: closed_message_fact_check_before_work
    when:
      - closed
    rule: >
      closed 後でも、メッセージ上で症状・再現条件・ログ・スクショ・必要最小限の関係ファイルZIPなど確認材料を受け取ることはできる。
      ただし、実際にコードを直す、差し替えファイルを作る、納期を置く、成果物を返す段階に入るなら、
      見積り提案または新規依頼へ戻す。
      こちら起因の可能性がある場合でも、0円作業や無料修正を外向けに約束しない。
      「確認しないまま通常料金の新規依頼として進めない」「作業に入る前にココナラ上でどう進めるかと費用が発生するかを先に相談する」程度に留め、
      実際の提案金額は service.yaml のカテゴリ最低価格と画面上の制約を確認してから決める。
      「ZIPで送れば直して返す」と読ませず、確認材料の受領と実作業を分ける。
      100MB超などで添付が難しい時も、Workspace の運用として外部ストレージや外部リポジトリ共有へ逃がさず、
      外向けに「ココナラ仕様で外部共有不可」と断定しない。
      必要部分だけに絞る / 分割する / 秘密値を除く方向へ寄せる。
    based_on:
      - closed_talkroom_locked
      - message_vs_talkroom
      - estimate_proposal_flow
      - category_minimum_price_exists

  - id: finish_extra_charge_before_formal_delivery
    mode:
      - delivery
    when:
      - pre_formal_delivery
    rule: >
      platform 上はクローズ前に追加支払いできる時間帯があるが、
      Workspace では追加費用や追加作業の合意を原則として正式な納品前に終える。
      正式な納品後の追加請求を前提に本文を書かない。
    based_on:
      - formal_delivery_exists
      - additional_payment_before_close

  - id: do_not_use_ohineri_after_closed
    when:
      - closed
    rule: >
      closed 後の追加確認・追加作業・返金不満に対して、おひねりや旧トークルーム内の追加購入を導線にしない。
      まずメッセージ上で前回修正との関係を確認し、実作業が必要なら見積り提案または新規依頼へ戻す。
    based_on:
      - closed_talkroom_locked
      - additional_payment_before_close

  - id: confirm_before_formal_delivery
    mode:
      - delivery
    when:
      - pre_formal_delivery
    rule: >
      初回の正式な納品前に、buyer へ「この内容で送って問題ないか」の確認を挟く。
      差し戻し回数の上限を、初回納品文で圧として出しすぎない。
    based_on:
      - formal_delivery_exists
      - rejection_limit_exists

  - id: internal_sla_for_purchase_reply
    when:
      - purchased
    rule: >
      48時間初回返信と長期無応答リスクを内部SLOとして扱う。
      遅れる前に区切り連絡を入れ、期限破り後の謝罪だけで終わらせない。
    based_on:
      - first_reply_after_purchase_deadline
      - silence_cancel_risk
