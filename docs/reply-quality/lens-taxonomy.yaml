version: 1
updated: "2026-05-02"
purpose: >
  日本語自然化・ビジネスチャット品質・取引判断の監査レンズを階層化し、
  blanket NG や過剰 lint 化を防ぐ。

hard_guards:
  description: "レンズではなく deterministic guard。壊れたら必須修正。"
  items:
    - public_private_boundary
    - price_and_service_scope
    - phase_contract
    - raw_secret_value
    - external_contact_share_payment
    - direct_push_or_prod_deploy
    - closed_after_work_boundary
    - success_refund_free_guarantee

formal_soft_lenses:
  business_chat_viability:
    umbrella: true
    description: "返信が受付票、FAQ、規約説明、自動応答ではなく、担当者の実務チャットとして読めるか"
    role: "umbrella_only"
    usage_note: "一次判定名として乱用せず、下位 lens のどれが効いているかを併記する"
    hard_fail: false
    overfire_note: "高リスク場面の硬さは acceptable_as_is にできる"
    preferred_return_targets:
      - reviewer_prompt
      - japanese_chat_natural_skill
      - gold_reply

  answer_focus_alignment:
    description: "複数症状・複数質問の中で、buyer が次に決めたい主質問と、その対象症状・価格・scope の単位が返信の初手に合っているか"
    hard_fail: false
    role: "decision_contract_lens"
    parent_layer: reply_contract
    apply_when:
      - multiple_symptoms
      - multiple_explicit_questions
      - final_action_question
      - buyer_priority_phrase
      - price_scope_asked
    overfire_note: "最後の文を機械的に primary にしない。final_question_id は cue であり、primary_question_id は buyer の意思決定・phase・明示優先度から選ぶ。"
    preferred_return_targets:
      - reply_contract
      - response_decision_plan
      - contract_packet
      - reviewer_prompt

  response_weight_mismatch:
    description: "buyer の質問量・温度・risk に対して返信が重すぎる/軽すぎる/拒否先行すぎないか"
    hard_fail: false
    subtypes:
      - surface_overexposure
      - unnecessary_refusal_frame
      - answer_order_calibration
      - purchase_cta_strength_calibration
      - purchase_before_materials_order
      - buyer_burden_alignment
      - material_selection_burden
    subtype_notes:
      purchase_cta_strength_calibration: "迷い・条件付き購入・直りそうなら購入などの buyer 温度に対して、購入導線が押し込みに見えないか"
      purchase_before_materials_order: "prequote / quote_sent で buyer がまだ購入判断中の時、購入後の材料案内が CTA より先に出て買う前提に見えないか"
    preferred_return_targets:
      - gold_reply
      - reviewer_prompt

  positive_flow_before_refusal:
    description: "軽い手順確認では、不可表明より先に通常フローを案内する"
    parent_lens: response_weight_mismatch
    role: "soft_subtype"
    hard_fail: false
    apply_when:
      - buyer_asks_share_timing_only
      - buyer_asks_after_payment_flow
      - buyer_asks_light_procedure
    do_not_apply_when:
      - prepurchase_diagnosis_requested
      - github_drive_external_work_surface
      - raw_secret_value_offer
      - direct_push_or_prod_deploy
      - closed_free_refund_or_repair_request
    preferred_return_targets:
      - reviewer_prompt
      - gold_reply

  agency_alignment:
    description: "buyer / seller / third party の行為主体、依頼先、確認者、許可の向きが主質問とズレていないか"
    hard_fail: false
    subtypes:
      - permission_benefit_alignment
      - actor_direction_alignment
      - request_target_alignment
      - deictic_agency_alignment
    subtype_notes:
      deictic_agency_alignment: "こちら / そちら / 主語省略により、buyer がする作業と seller がする確認が1文内で混線していないか"
    standard_examples:
      request_can_i_order: "ご依頼いただけます / 対応できます"
      can_you_check: "こちらで確認します / 対応できます"
      can_you_explain: "こちらで短く整理します / 補足説明をお送りします"
      can_i_consult: "ご相談いただけます"
      after_payment_send: "お支払い完了後にトークルームで共有してください"
      file_unknown_buyer: "無理に絞らなくて大丈夫です。必要な範囲はこちらで確認します。"
    blanket_ng:
      - "相談できます"
      - "確認できます"
      - "大丈夫です"
    blanket_ng_policy: "上記は blanket NG ではない。主体ズレがある時だけ直す。"
    preferred_return_targets:
      - japanese_chat_natural_skill
      - reviewer_prompt
      - gold_reply

  promise_consistency:
    description: "前段の留保・不可・条件付き回答を、後段の成果物・納期・次アクションが上書きして見えないか"
    hard_fail: false
    escalates_to_hard_when:
      - success_guarantee_shadow
      - free_refund_guarantee_shadow
      - closed_after_work_promise
      - prepurchase_work_start
    preferred_return_targets:
      - reviewer_prompt
      - gold_reply

  conversation_flow_naturalness:
    description: "主質問への直答、条件、理由、次アクションが会話として自然につながっているか"
    hard_fail: false
    subtypes:
      - block_rhythm_flow
      - topic_label_distance
    related_gates:
      - safe_connection
    preferred_return_targets:
      - japanese_chat_natural_skill
      - gold_reply

  commitment_strength_calibration:
    description: "時刻、納期、修正完了、返金/無料、成果物返却の約束が情報量と phase に合っているか"
    hard_fail: false
    preferred_return_targets:
      - reviewer_prompt
      - batch

  negative_frame_non_echo:
    description: "責めたいわけではない、文句ではない、返金してほしい等をそのまま復唱せず、実務目的へ要約する"
    hard_fail: false
    preferred_return_targets:
      - japanese_chat_natural_skill
      - gold_reply

  post_completion_followup_scope_clarity:
    description: "完了後・納品後・クローズ後の再相談で、見立てとしての確認、実作業、成果物返却、費用相談の違いが buyer に分かるか"
    hard_fail: false
    role: "post_completion_scope_lens"
    platform_subtypes:
      - coconala_closed_relation_check_scope_clarity
    apply_when:
      - delivered_followup_check
      - closed_relation_check
      - repeat_error_after_close
      - refund_or_free_after_close
    standard_order:
      - "確認材料を送れるかに答える"
      - "見える範囲で何を判断するかを短く言う"
      - "ここでできる範囲を明示する"
      - "コード修正・修正済みファイル返却・費用判断は実作業前に相談する"
    escalates_to_hard_when:
      - closed_after_work_promise
      - free_refund_guarantee_shadow
      - refund_cancel_assertion
    preferred_return_targets:
      - reviewer_prompt
      - gold_reply
      - validator

naturalizer_gates:
  safe_connection:
    description: "自然につなげてよい文は、同じ役割・同じ約束レベルの文だけ"
    do_connect:
      - "届いている内容で確認に入ります。いま追加で準備いただくものはありません。"
    do_not_connect_without_condition:
      - "必ず直るとはお約束できません。ただ、ご購入後に修正済みファイルをお返しします。"
      - "closed 後の関係確認と修正作業開始"
      - "返金未定と無料対応"
    action: "unsafe_to_smooth の場合は約束レベルごとに文を分ける"

observe_only:
  - voice_ownership
  - issue_proximity
  - topic_label_distance
  - buyer_burden_alignment
  - instructional_tone_leak
  - echo_to_working_angle
  - answer_order_calibration
  - certainty_calibration # use commitment_strength_calibration when the issue is promise strength
  - overhelpful_interpretation

preference_only:
  - punctuation_count
  - paragraph_count_only
  - hai_presence_only
  - mazuwa_presence_only
  - daijobu_presence_only
  - dekimasu_presence_only
  - no_ken_presence_only
  - mild_stiffness_in_high_risk_context

review_output_labels:
  - hard_by_underlying_guard
  - fix_recommended
  - acceptable_as_is
  - observe_only
  - overfire_risk
  - preference
