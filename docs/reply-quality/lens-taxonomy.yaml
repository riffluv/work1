version: 1
updated: "2026-05-02"
purpose: >
  日本語自然化・ビジネスチャット品質・取引判断の監査レンズを階層化し、
  blanket NG や過剰 lint 化を防ぐ。

hard_guards:
  description: "レンズではなく deterministic guard。壊れたら必須修正。"
  items:
    - public_private_boundary
    - price_and_service_scope
    - phase_contract
    - raw_secret_value
    - external_contact_share_payment
    - direct_push_or_prod_deploy
    - closed_after_work_boundary
    - success_refund_free_guarantee

formal_soft_lenses:
  business_chat_viability:
    umbrella: true
    description: "返信が受付票、FAQ、規約説明、自動応答ではなく、担当者の実務チャットとして読めるか"
    role: "umbrella_only"
    usage_note: "一次判定名として乱用せず、下位 lens のどれが効いているかを併記する"
    hard_fail: false
    overfire_note: "高リスク場面の硬さは acceptable_as_is にできる"
    preferred_return_targets:
      - reviewer_prompt
      - japanese_chat_natural_skill
      - gold_reply

  answer_focus_alignment:
    description: "複数症状・複数質問の中で、buyer が次に決めたい主質問と、その対象症状・価格・scope の単位が返信の初手に合っているか"
    hard_fail: false
    role: "decision_contract_lens"
    parent_layer: reply_contract
    apply_when:
      - multiple_symptoms
      - multiple_explicit_questions
      - final_action_question
      - buyer_priority_phrase
      - price_scope_asked
    overfire_note: "最後の文を機械的に primary にしない。final_question_id は cue であり、primary_question_id は buyer の意思決定・phase・明示優先度から選ぶ。"
    preferred_return_targets:
      - reply_contract
      - response_decision_plan
      - contract_packet
      - reviewer_prompt

  phase_evidence_alignment:
    description: "phase 固有の closing / 支払い導線 / トークルーム導線が、state metadata または buyer 文の証拠と合っているか"
    hard_fail: false
    role: "phase_contract_reviewer_subtype"
    parent_guard: phase_contract
    apply_when:
      - phase_specific_closing
      - quote_sent_purchase_cta
      - prequote_estimate_cta
    standard_examples:
      quote_sent_only_closing: "`見積り提案の内容で` は `quote_sent` または buyer 文の見積り提案証拠がある時だけ使う"
      prequote_closing: "`prequote` では `この内容で問題なければ、15,000円で見積り提案します` に留める"
    escalates_to_hard_when:
      - prepurchase_work_start
      - payment_route_misstatement
      - quote_sent_only_cta_in_prequote
    preferred_return_targets:
      - reviewer_prompt
      - lint
      - phase_contract

  response_weight_mismatch:
    description: "buyer の質問量・温度・risk に対して返信が重すぎる/軽すぎる/拒否先行すぎないか"
    hard_fail: false
    subtypes:
      - surface_overexposure
      - unnecessary_refusal_frame
      - answer_order_calibration
      - purchase_cta_strength_calibration
      - purchase_before_materials_order
      - buyer_burden_alignment
      - material_selection_burden
    subtype_notes:
      purchase_cta_strength_calibration: "迷い・条件付き購入・直りそうなら購入などの buyer 温度に対して、購入導線が押し込みに見えないか"
      purchase_before_materials_order: "prequote / quote_sent で buyer がまだ購入判断中の時、購入後の材料案内が CTA より先に出て買う前提に見えないか"
    preferred_return_targets:
      - gold_reply
      - reviewer_prompt

  positive_flow_before_refusal:
    description: "軽い手順確認では、不可表明より先に通常フローを案内する"
    parent_lens: response_weight_mismatch
    role: "soft_subtype"
    hard_fail: false
    apply_when:
      - buyer_asks_share_timing_only
      - buyer_asks_after_payment_flow
      - buyer_asks_light_procedure
    do_not_apply_when:
      - prepurchase_diagnosis_requested
      - github_drive_external_work_surface
      - raw_secret_value_offer
      - direct_push_or_prod_deploy
      - closed_free_refund_or_repair_request
    preferred_return_targets:
      - reviewer_prompt
      - gold_reply

  warm_boundary_entry:
    description: "進める意思がある buyer の近道依頼を断る時、いきなり不可表明から入らず、短い中立的な受けを置いてから境界と正規ルートを出せているか"
    parent_lens: response_weight_mismatch
    role: "soft_subtype"
    hard_fail: false
    apply_when:
      - buyer_shows_purchase_intent
      - prepurchase_shortcut_request
      - wants_precheck_before_payment
      - says_will_buy_if_likely_fixable
    do_not_apply_when:
      - buyer_only_asks_share_timing
      - raw_secret_value_offer
      - direct_push_or_prod_deploy
      - hostile_or_refund_pressure
    standard_order:
      - short_neutral_ack
      - boundary
      - service_applicability
      - conditional_cta
      - post_payment_materials_if_needed
    preferred_return_targets:
      - writer_brief
      - japanese_chat_natural_skill
      - gold_reply

  agency_alignment:
    description: "buyer / seller / third party の行為主体、依頼先、確認者、許可の向きが主質問とズレていないか"
    hard_fail: false
    subtypes:
      - permission_benefit_alignment
      - actor_direction_alignment
      - request_target_alignment
      - deictic_agency_alignment
      - capability_declaration_drift
    subtype_notes:
      deictic_agency_alignment: "こちら / そちら / 主語省略により、buyer がする作業と seller がする確認が1文内で混線していないか"
      capability_declaration_drift: "buyer が説明・確認・見立てを求めている場面で、対応可否の宣言だけに止まり、seller が何を返すかが見えない状態"
    standard_examples:
      request_can_i_order: "ご依頼いただけます / 対応できます"
      can_you_check: "こちらで確認します / 対応できます"
      can_you_explain: "こちらで短く整理します / 補足説明をお送りします"
      can_i_consult: "ご相談いただけます"
      after_payment_send: "お支払い完了後にトークルームで共有してください"
      file_unknown_buyer: "ご購入後にコード一式をZIPで共有いただければ、必要な範囲はこちらで確認します。"
    blanket_ng:
      - "相談できます"
      - "確認できます"
      - "大丈夫です"
    blanket_ng_policy: "上記は blanket NG ではない。主体ズレがある時だけ直す。"
    preferred_return_targets:
      - japanese_chat_natural_skill
      - reviewer_prompt
      - gold_reply

  promise_consistency:
    description: "前段の留保・不可・条件付き回答を、後段の成果物・納期・次アクションが上書きして見えないか"
    hard_fail: false
    escalates_to_hard_when:
      - success_guarantee_shadow
      - free_refund_guarantee_shadow
      - closed_after_work_promise
      - prepurchase_work_start
    preferred_return_targets:
      - reviewer_prompt
      - gold_reply

  conversation_flow_naturalness:
    description: "主質問への直答、条件、理由、次アクションが会話として自然につながっているか"
    hard_fail: false
    subtypes:
      - block_rhythm_flow
      - topic_label_distance
      - action_closure
      - context_anchor_granularity
      - context_anchor_over_reconstruction
      - boundary_phrase_maturity
      - boundary_layer_separation
    subtype_notes:
      action_closure: "buyer が次に何をすればよいかが閉じているか。`大丈夫です` `不要です` だけで終わり、結局どうするのかを残していないか"
      context_anchor_granularity: "相手文を拾う量が主質問への答えに必要な核へ収まっているか。詳しい相談文でも、症状・背景・不安を同じ粒度で再構成せず、対象範囲が分かる最小の anchor を残す"
      context_anchor_over_reconstruction: "長い相談文を、冒頭や回答前に症状・背景・不安の完全要約へ戻して入力要約 bot のように見せていないか"
      boundary_phrase_maturity: "支払い前不可・範囲外・closed後不可などを、buyer の口語を貼り戻さず、短い業務文として成熟した言い方にできているか"
      boundary_layer_separation: "支払い前不可 / 症状の対応可否 / CTA / 購入後材料案内など、役割の違う層を `ただ` や長文で無理につないでいないか"
    related_gates:
      - safe_connection
    preferred_return_targets:
      - japanese_chat_natural_skill
      - gold_reply

  semantic_grounding:
    description: "相手文・受領済み資料・phase上の事実にない技術原因、作業状況、受領済み事実、成果物を足していないか"
    hard_fail: false
    role: "grounding_lens"
    subtypes:
      - unsupported_technical_hypothesis
      - invented_received_material
      - invented_work_status
      - overhelpful_interpretation
    escalates_to_hard_when:
      - prepurchase_work_start
      - claim_unreceived_materials_as_received
      - assert_unconfirmed_cause
      - success_guarantee_shadow
    preferred_return_targets:
      - reviewer_prompt
      - lint
      - reply_contract

  answerability_boundary:
    description: "buyer の主質問に答えるために、受領状態・作業状況・期限権限・納品物 context が必要かを見て、根拠なしの断定や具体名生成を止める"
    hard_fail: false
    role: "pre_writer_authority_gate"
    subtypes:
      - receipt_status_authority
      - work_status_authority
      - deadline_authority
      - delivery_artifact_answerability
      - verification_target_answerability
      - answer_vs_ack_placeholder
    subtype_notes:
      receipt_status_authority: "`届いています` `受け取っています` は material_received の根拠がある時だけ使う"
      work_status_authority: "`今は〜を見ています` `確認しています` は actual work status がある時だけ使う"
      deadline_authority: "`本日18:00まで` などの具体時刻は、実際に返せる権限・運用時刻がある時だけ使う"
      delivery_artifact_answerability: "delivered で修正ファイル名や反映順を聞かれた時、納品物 context なしに具体名を作らない"
      verification_target_answerability: "確認画面や検証箇所を聞かれた時、実装・納品 context なしに画面名を作らない"
      answer_vs_ack_placeholder: "答えられる場面で `整理してお伝えします` だけに逃げず、答えられない場面では context needed として止める"
    escalates_to_hard_when:
      - assert_received_material_without_state
      - assert_work_status_without_state
      - invent_delivery_file_or_screen
      - set_deadline_without_authority
    preferred_return_targets:
      - reply_contract
      - reviewer_prompt
      - lint
      - future_saas_core

  commitment_strength_calibration:
    description: "時刻、納期、修正完了、返金/無料、成果物返却の約束が情報量と phase に合っているか"
    hard_fail: false
    subtypes:
      - deadline_autoinsertion_calibration
    subtype_notes:
      deadline_autoinsertion_calibration: "buyer が時刻を聞いていない軽い補足・確認案内で、具体時刻を自動挿入して約束を強めていないか"
    preferred_return_targets:
      - reviewer_prompt
      - batch

  negative_frame_non_echo:
    description: "責めたいわけではない、文句ではない、返金してほしい等をそのまま復唱せず、実務目的へ要約する"
    hard_fail: false
    preferred_return_targets:
      - japanese_chat_natural_skill
      - gold_reply

  post_completion_followup_scope_clarity:
    description: "完了後・納品後・クローズ後の再相談で、見立てとしての確認、実作業、成果物返却、費用相談の違いが buyer に分かるか"
    hard_fail: false
    role: "post_completion_scope_lens"
    platform_subtypes:
      - coconala_closed_relation_check_scope_clarity
    apply_when:
      - delivered_followup_check
      - closed_relation_check
      - repeat_error_after_close
      - refund_or_free_after_close
    standard_order:
      - "確認材料を送れるかに答える"
      - "見える範囲で何を判断するかを短く言う"
      - "ここでできる範囲を明示する"
      - "コード修正・修正済みファイル返却・費用判断は実作業前に相談する"
    escalates_to_hard_when:
      - closed_after_work_promise
      - free_refund_guarantee_shadow
      - refund_cancel_assertion
    preferred_return_targets:
      - reviewer_prompt
      - gold_reply
      - validator

naturalizer_gates:
  safe_connection:
    description: "自然につなげてよい文は、同じ役割・同じ約束レベルの文だけ"
    do_connect:
      - "届いている内容で確認に入ります。いま追加で準備いただくものはありません。"
    do_not_connect_without_condition:
      - "必ず直るとはお約束できません。ただ、ご購入後に修正済みファイルをお返しします。"
      - "closed 後の関係確認と修正作業開始"
      - "返金未定と無料対応"
    action: "unsafe_to_smooth の場合は約束レベルごとに文を分ける"

observe_only:
  - voice_ownership
  - issue_proximity
  - topic_label_distance
  - buyer_burden_alignment
  - instructional_tone_leak
  - echo_to_working_angle
  - answer_order_calibration
  - certainty_calibration # use commitment_strength_calibration when the issue is promise strength
  - overhelpful_interpretation

preference_only:
  - punctuation_count
  - paragraph_count_only
  - hai_presence_only
  - mazuwa_presence_only
  - daijobu_presence_only
  - dekimasu_presence_only
  - no_ken_presence_only
  - mild_stiffness_in_high_risk_context

review_output_labels:
  - hard_by_underlying_guard
  - fix_recommended
  - acceptable_as_is
  - observe_only
  - overfire_risk
  - preference
